            description: 'Warning threshold of the datastore free space. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$VMWARE.HV.SENSOR.DISCOVERY}'
          value: 'false'
          description: 'Set "true"/"false" to enable or disable the monitoring of hardware sensors.'
          config:
            type: CHECKBOX
            priority: '7'
            section_name: Filters
            label: 'Monitoring of hardware sensors'
            description: 'Whether it is necessary to monitor of hardware sensors.'
            options:
              - checked: 'true'
                unchecked: 'false'
        - macro: '{$VMWARE.HV.SENSOR.DISCOVERY.NAME.MATCHES}'
          value: '.*'
          description: 'Sets the regex string of hardware sensor names to be allowed in discovery.'
          config:
            type: TEXT
            priority: '8'
            section_name: Filters
            label: 'Include hardware sensors filter'
            description: 'Regex string to include hardware sensors by sensors name.'
        - macro: '{$VMWARE.HV.SENSOR.DISCOVERY.NAME.NOT_MATCHES}'
          value: CHANGE_IF_NEEDED
          description: 'Sets the regex string of hardware sensor names to be ignored in discovery.'
          config:
            type: TEXT
            priority: '9'
            section_name: Filters
            label: 'Exclude hardware sensors filter'
            description: 'Regex string to exclude hardware sensors by sensors name.'
        - macro: '{$VMWARE.HV.UUID}'
          description: 'UUID of hypervisor.'
          config:
            type: TEXT
            priority: '4'
            label: 'Hypervisor UUID'
            description: 'UUID of hypervisor.'
