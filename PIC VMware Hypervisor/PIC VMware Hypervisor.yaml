        - uuid: 238577e35a1144d48c510a634a05ed2c
          name: 'Healthcheck discovery'
          type: DEPENDENT
          key: vmware.hv.healthcheck.discovery
          description: 'VMware Rollup Health State sensor discovery.'
          item_prototypes:
            - uuid: 7ee7b5f7f7ed4b1892aa7236537a0a99
              name: 'Health state rollup'
              type: DEPENDENT
              key: 'vmware.hv.sensor.health.state[{#SINGLETON}]'
              description: |
                The host's Rollup Health State sensor value. One of the following:
                - Gray: Unknown;
                - Green: OK;
                - Yellow: It might have a problem;
                - Red: It has a problem.
              valuemap:
                name: 'VMware status'
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$..HostNumericSensorInfo[?(@.name=="VMware Rollup Health State")].healthState.label.first()'
                - type: JAVASCRIPT
                  parameters:
                    - |
                      const idx = [
                      	'gray',
                      	'green',
                      	'yellow',
                      	'red'
                      ].indexOf(value.toLowerCase());
                      return idx !== -1 ? idx : 0;
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: 'vmware.hv.sensors.get[{$VMWARE.URL},{$VMWARE.HV.UUID}]'
              tags:
                - tag: component
                  value: health
              trigger_prototypes:
                - uuid: f6926657db284fa1af15a84de5475f1c
                  expression: 'last(/PIC VMware Hypervisor/vmware.hv.sensor.health.state[{#SINGLETON}])=3'
                  name: 'VMware Hypervisor: The {$VMWARE.HV.UUID} health is Red'
                  status: DISABLED
                  priority: HIGH
                  description: 'One or more components in the appliance might be in an unusable status and the appliance might soon become unresponsive. Security patches might be available.'
                  dependencies:
                    - name: 'VMware Hypervisor: The {$VMWARE.HV.UUID} health is Red'
                      expression: 'last(/PIC VMware Hypervisor/vmware.hv.status[{$VMWARE.URL},{$VMWARE.HV.UUID}])=3'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: cada73898f014b85a83db4e32423ceb8
                  expression: 'last(/PIC VMware Hypervisor/vmware.hv.sensor.health.state[{#SINGLETON}])=2'
                  name: 'VMware Hypervisor: The {$VMWARE.HV.UUID} health is Yellow'
                  status: DISABLED
                  priority: AVERAGE
                  description: 'One or more components in the appliance might soon become overloaded.'
                  dependencies:
                    - name: 'VMware Hypervisor: The {$VMWARE.HV.UUID} health is Red'
                      expression: 'last(/PIC VMware Hypervisor/vmware.hv.sensor.health.state[{#SINGLETON}])=3'
                    - name: 'VMware Hypervisor: The {$VMWARE.HV.UUID} health is Red'
                      expression: 'last(/PIC VMware Hypervisor/vmware.hv.status[{$VMWARE.URL},{$VMWARE.HV.UUID}])=3'
                    - name: 'VMware Hypervisor: The {$VMWARE.HV.UUID} health is Yellow'
                      expression: 'last(/PIC VMware Hypervisor/vmware.hv.status[{$VMWARE.URL},{$VMWARE.HV.UUID}])=2'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
          master_item:
            key: 'vmware.hv.sensors.get[{$VMWARE.URL},{$VMWARE.HV.UUID}]'
          preprocessing:
            - type: JSONPATH
              parameters:
                - '$..HostNumericSensorInfo[?(@.name=="VMware Rollup Health State")]'
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
            - type: JAVASCRIPT
              parameters:
                - 'return JSON.stringify(value != "[]" ? [{''{#SINGLETON}'': ''''}] : []);'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
        - uuid: 1892bec8480642a6ad3c87f2d61cb56a
          name: 'Network interface discovery'
          type: SIMPLE
          key: 'vmware.hv.net.if.discovery[{$VMWARE.URL},{$VMWARE.HV.UUID}]'
          delay: 1h
          username: '{$VMWARE.USERNAME}'
