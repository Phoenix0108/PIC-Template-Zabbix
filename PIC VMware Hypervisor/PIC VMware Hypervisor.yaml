          item_prototypes:
            - uuid: b474cbdf81ad445689bb9f0a442a3ce3
              name: '[{#IFNAME}] network interface speed'
              type: SIMPLE
              key: 'vmware.hv.network.linkspeed[{$VMWARE.URL},{$VMWARE.HV.UUID},{#IFNAME}]'
              units: bps
