              value: cluster
        - uuid: 249d0175239a495b87185afa15a76e02
          name: 'Connection state'
          type: SIMPLE
          key: 'vmware.hv.connectionstate[{$VMWARE.URL},{$VMWARE.HV.UUID}]'
          username: '{$VMWARE.USERNAME}'
          password: '{$VMWARE.PASSWORD}'
          description: |
            VMware hypervisor connection state. One of the following:
            - Connected;
            - Disconnected;
            - Not responding.
          valuemap:
            name: 'VMware Connection state'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  const idx = [
                  	'connected',
                  	'disconnected',
                  	'notResponding'
                  ].indexOf(value);
                  return idx !== -1 ? idx : 3;
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: availability
        - uuid: 5301cf52d473414eb20a8d9a72d437d1
