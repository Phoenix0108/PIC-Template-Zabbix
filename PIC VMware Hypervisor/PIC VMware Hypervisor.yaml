              name: 'VMware Hypervisor: Hypervisor has been restarted'
              event_name: 'VMware Hypervisor: Hypervisor has been restarted (uptime < 10m)'
              status: DISABLED
              priority: WARNING
              description: 'Uptime is less than 10 minutes.'
              manual_close: 'YES'
