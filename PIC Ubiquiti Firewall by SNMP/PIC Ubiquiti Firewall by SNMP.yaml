  triggers:
    - uuid: e91c8a84215245798977400b1c0229ef
      expression: |
        nodata(/PIC Ubiquiti Firewall by SNMP/ubiquiti.memory.available,12h)=0 and
        avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.memory.available,15m) < min(/PIC Ubiquiti Firewall by SNMP/ubiquiti.memory.available,12h) * 0.75 and
        ((avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.memory.total,#5) - avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.memory.available,#5)) / avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.memory.total,#5)) * 100 > {$UBIQUITI_MEMORY_USED_MAX}
      name: 'High Memory Usage'
      status: DISABLED
      priority: AVERAGE
      description: 'Memory usage is unusually high relative to the past 12h baseline and exceeds the configured maximum threshold. This condition may indicate a memory leak, runaway process, or unexpected load. Suppressed if less than 12h of history exists.'
      manual_close: 'YES'
      tags:
        - tag: Component
          value: Memory
        - tag: Metrics
          value: Utilisation
        - tag: Severity
          value: Threshold
    - uuid: 664a6c6514d747ea806688659669eb4b
      expression: 'last(/PIC Ubiquiti Firewall by SNMP/system.uptime) > 1800 and avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.swap.available,12h) < min(/PIC Ubiquiti Firewall by SNMP/ubiquiti.swap.available,12h) * 0.8'
      name: 'High Swap usage'
      status: DISABLED
      priority: AVERAGE
      description: 'Swap usage is above {$UBIQUITI_SWAP_USED_MAX}% averaged over 5 samples.  Indicates memory pressure or prolonged resource exhaustion.'
      manual_close: 'YES'
      tags:
        - tag: Component
          value: Swap
        - tag: Metrics
          value: Utilisation
        - tag: Severity
          value: Threshold
