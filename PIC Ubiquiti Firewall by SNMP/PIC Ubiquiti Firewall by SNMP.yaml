        - uuid: ccf61244d51a485d87e1fa4bf39bfcf2
          name: 'Interfaces (VLAN)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},1.3.6.1.2.1.2.2.1.2,{#IFTYPE},1.3.6.1.2.1.2.2.1.3]'
          key: ubiquiti.vlan.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFDESCR}'
                value: '^switch[0-9]+\.[0-9]+$'
              - macro: '{#IFTYPE}'
                value: ^(6|53|135)$
          description: 'Discovers VLAN sub-interfaces (switch0.x) via the IF-MIB interface table. Filters on ifDescr matching the switch[0-9]+\.[0-9]+ pattern and ifType values 6 (ethernetCsmacd), 53 (propVirtual), or 135 (mpls). Extracts the VLAN ID from the interface name suffix via JavaScript pre-processing.'
          item_prototypes:
            - uuid: fb7c3ade35b84540b97a0ce7e55e9025
              name: 'VLAN {#VLANID}: Bytes In'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}'
              key: 'vlan.bytes.in[{#VLANID}]'
              history: 30d
              value_type: FLOAT
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
                - tag: VLAN
                  value: '{#VLANID}'
            - uuid: 07e60f53e4ab4cdbab24d8d53d269bae
              name: 'VLAN {#VLANID}: Bytes Out'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}'
              key: 'vlan.bytes.out[{#VLANID}]'
              history: 30d
              value_type: FLOAT
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
                - tag: VLAN
                  value: '{#VLANID}'
            - uuid: eba9534eff8f484e9019fa2e23b40f72
              name: 'VLAN {#VLANID}: Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'vlan.errors.in[{#VLANID}]'
              delay: 2m
              history: 30d
              value_type: FLOAT
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
                - tag: VLAN
                  value: '{#VLANID}'
              trigger_prototypes:
                - uuid: 7ea2f505222347259ca36ec0bc37521a
                  expression: 'avg(/PIC Ubiquiti Firewall by SNMP/vlan.errors.in[{#VLANID}],5m) > {$UBIQUITI_VLAN_ERROR_THRESHOLD}'
                  name: 'VLAN {#VLANID}: Inbound Errors High'
                  status: DISABLED
                  priority: AVERAGE
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: Interface
                      value: VLAN
                    - tag: Symptom
                      value: Config/Trunk
                    - tag: VLAN
                      value: '{#VLANID}'
            - uuid: 49d944f6165d4603aa732d7c109e44c4
              name: 'VLAN {#VLANID}: Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'vlan.errors.out[{#VLANID}]'
              delay: 2m
              history: 30d
              value_type: FLOAT
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Traffic
                - tag: VLAN
                  value: '{#VLANID}'
              trigger_prototypes:
                - uuid: 1d7b6ad36015478fbcce5c9f469f5e22
                  expression: 'avg(/PIC Ubiquiti Firewall by SNMP/vlan.errors.out[{#VLANID}],5m) > {$UBIQUITI_VLAN_ERROR_THRESHOLD}'
                  name: 'VLAN {#VLANID}: Outbound Errors High'
                  status: DISABLED
                  priority: AVERAGE
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: Interface
                      value: VLAN
                    - tag: Symptom
                      value: Config/Trunk
                    - tag: VLAN
                      value: '{#VLANID}'
            - uuid: 09f326e610d9411bb9736be928a91c89
              name: 'VLAN {#VLANID}: Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'vlan.status[{#VLANID}]'
              history: 30d
              valuemap:
                name: interface.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: VLAN
                - tag: Metrics
                  value: Status
                - tag: VLAN
                  value: '{#VLANID}'
              trigger_prototypes:
                - uuid: 30af3b5401df4d9a905784ac933e172a
                  expression: 'min(/PIC Ubiquiti Firewall by SNMP/vlan.status[{#VLANID}],5m) = 2'
                  name: 'VLAN {#VLANID}: Status Down'
                  status: DISABLED
                  priority: WARNING
                  description: 'VLAN {#VLANID} interface has been in a down state for at least 5 minutes. This may indicate a trunk misconfiguration or upstream link failure.'
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: Interface
                      value: VLAN
                    - tag: Symptom
                      value: Flap/Down
                    - tag: VLAN
                      value: '{#VLANID}'
          graph_prototypes:
            - uuid: b347c7d6931d4aeeaa0b483be960082e
              name: 'VLAN {#VLANID}: Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'vlan.bytes.in[{#VLANID}]'
                - sortorder: '1'
                  color: 0080FF
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'vlan.bytes.out[{#VLANID}]'
                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'vlan.errors.in[{#VLANID}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'vlan.errors.out[{#VLANID}]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  data.forEach(function(item) {
                      var match = item['{#IFDESCR}'].match(/\.(\d+)$/);
                      item['{#VLANID}'] = match ? match[1] : item['{#IFDESCR}'];
                  });
                  return JSON.stringify(data);
        - uuid: 3c05dff531814ccfab93b64f2a47b2ad
          name: 'VPN Tunnels (L2TP Based)'
