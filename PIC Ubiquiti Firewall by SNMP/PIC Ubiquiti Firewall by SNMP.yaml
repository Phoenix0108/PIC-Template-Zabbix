        - uuid: 9433915772924eba9fbea27a434e3440
          name: Processes
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#PROCESSINDEX},1.3.6.1.4.1.2021.2.1.1,{#PROCESSNAME},1.3.6.1.4.1.2021.2.1.2]'
          key: ubiquiti.process.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#PROCESSNAME}'
                value: '^(?!kworker|migration|rcu|watchdog).*'
          description: 'Discovers running processes via the UCD-SNMP process table (prTable). Excludes kernel threads such as kworker, migration, rcu, and watchdog, which are not user-space processes and carry no meaningful monitoring value.'
          item_prototypes:
            - uuid: fa6ebfef846049a7a1637358785d882d
              name: 'Process: {#PROCESSNAME} Count'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2021.2.1.5.{#PROCESSINDEX}'
              key: 'ubiquiti.process.count[{#PROCESSINDEX}]'
              delay: 2m
              history: 30d
              description: 'Number of active processes matching {#PROCESSNAME} currently running.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Processes
                - tag: Metrics
                  value: Performance
              trigger_prototypes:
                - uuid: 933ea110ae924365806385e0d49cfab4
                  expression: 'avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.process.count[{#PROCESSINDEX}],#5)=0'
                  name: 'Process {#PROCESSNAME} is not running'
                  status: DISABLED
                  priority: AVERAGE
                  description: 'No instances of {#PROCESSNAME} detected over 5 samples. Process may have crashed or failed to start.'
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: Processes
                    - tag: Symptoms
                - uuid: 5085ef1f24044ac4b9136bad10954f76
                  expression: 'avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.process.count[{#PROCESSINDEX}],#5)< {$UBIQUITI_PROCESS_MIN:"{#PROCESSNAME}"}'
                  name: 'Too few {#PROCESSNAME} processes running'
                  status: DISABLED
                  priority: AVERAGE
                  description: 'Average number of running {#PROCESSNAME} processes over 5 samples is below expected threshold.'
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: Processes
                    - tag: Symptoms
                - uuid: 94a9103504de41b1bc921780916aaf88
                  expression: 'avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.process.count[{#PROCESSINDEX}],#5)< {$UBIQUITI_PROCESS_MAX:"{#PROCESSNAME}"}'
                  name: 'Too many {#PROCESSNAME} processes running'
                  status: DISABLED
                  priority: AVERAGE
                  description: 'Average process count over 5 samples for {#PROCESSNAME} exceeds expected range.'
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: Processes
                    - tag: Symptoms
        - uuid: 92a84989c7204263958021b53c8b0627
          name: 'Route Table'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#ROUTEDEST},1.3.6.1.2.1.4.21.1.1,{#ROUTEMASK},1.3.6.1.2.1.4.21.1.11,{#IFINDEX},1.3.6.1.2.1.4.21.1.2]'
          key: ubiquiti.route.discovery
          delay: 1h
          status: DISABLED
          description: 'Discovers all entries in the IPv4 routing table, mapping route destinations to their outgoing interfaces.'
          item_prototypes:
            - uuid: 6511dab8782f4bf99f3df2b667bf8d28
              name: 'Route: {#ROUTEDEST}/{#ROUTEMASK} Interface Index'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.4.21.1.2.{#ROUTEDEST}'
              key: 'ubiquiti.route.ifindex[{#ROUTEDEST}/{#ROUTEMASK}]'
              delay: 15m
              history: 30d
              description: 'Interface index for destination {#ROUTEDEST}/{#ROUTEMASK} (based on ipRouteIfIndex).'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
