        - uuid: 3eb3b98a99964f9c9e7f6296eb34f7ab
          name: 'Interfaces (Extended)'
          type: SNMP_AGENT
          snmp_oid: 'discover[{#IFDESCR},1.3.6.1.2.1.31.1.1.1.1, {#IFALIAS},1.3.6.1.2.1.31.1.1.1.18]'
          key: ubiquiti.xint.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFDESCR}'
                value: '^(ifb?|br*)+'
          description: 'Discovers bridge and IFB (Intermediate Functional Block) interfaces via the IF-MIB extended interface table (ifXTable). Filters on ifDescr matching ifb or br prefixes. These interfaces are used for traffic shaping, QoS, and inter-VLAN routing. Uses 64-bit counters (ifHCInOctets, ifHCOutOctets) where available.'
