zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: c5381dc540504dbba10e2d300554e4cd
      name: Firewall
    - uuid: a1b2c3d4e5f64789a1234567890abcd1
      name: 'PIC informatique - Template'
  templates:
    - uuid: 9a25f655bfb248e591b201965a99e6d6
      template: 'PIC Ubiquiti Firewall by SNMP'
      name: 'PIC Ubiquiti Firewall by SNMP'
      description: |
        Overview
        This template monitors Ubiquiti UniFi Security Gateway (USG), UniFi Dream Machine (UDM), and EdgeRouter series devices using SNMPv2.
        It provides metrics on system health, interfaces, CPU, memory, active sessions, and basic traffic statistics.
        
        Features
        - Device identification (model, name, location, uptime)
        - CPU and memory utilisation tracking
        - Interface traffic (in/out) and operational status
        - Active session count (established connections)
        - SNMP-based discovery of physical interfaces
        - Basic triggers for CPU/memory overuse and interface state change
        - Graphs for bandwidth and session statistics
        
        Items
        - System info (uptime, hostname, description)
        - CPU and memory usage
        - Active session count
        - Per-interface byte counters and status
        
        Discovery rules
        - Physical interface discovery using `ifDescr` and `ifOperStatus`
        
        Item prototypes
        - Interface in/out bytes per second
        - Interface operational status
        
        Trigger prototypes
        - Interface down alert
        - High CPU/memory usage alerts (optional based on thresholds)
        
        Graph prototypes
        - Interface traffic overview (in/out)
        - Session count trends
        
        Supported devices
        - Ubiquiti UniFi Security Gateway (USG/USG-Pro)
        - Ubiquiti EdgeRouter series (ER-X, ER-4, ER-12, etc.)
        - UniFi Dream Machine (basic support, SNMP limitations apply)
        
        Notes
        - Requires SNMP enabled on the device and allowed from the Zabbix proxy/server
        - Interface counters are in octets and converted to bits per second
        - SNMP agent responses may vary slightly across firmware or product lines
        
        Author: Simon Jackson / @sjackson0109
      groups:
        - name: Firewall
        - name: 'PIC informatique - Template'
      items:
        - uuid: e4bc123f8c1144f488cfc6af9e812580
          name: 'Device Contact'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.4.0
          key: system.contact
          delay: 6h
          history: 30d
          value_type: TEXT
          description: 'Contact details for the device administrator, pulled from SNMP sysContact.'
          tags:
            - tag: Component
              value: System
        - uuid: 3fe70b0ab46e4578b0c6d2c126cf41e6
          name: 'Device Location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: system.location
          delay: 6h
          history: 30d
          value_type: TEXT
          description: 'System location string as configured on the device SNMP agent.'
          tags:
            - tag: Component
              value: System
        - uuid: efe5ff4666554b02b2f33621ee16972e
          name: 'Device Name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 6h
          history: 30d
          value_type: TEXT
          description: 'System name or hostname as defined by SNMP on the device.'
          tags:
            - tag: Component
              value: System
        - uuid: 1742a4a4f9ff40ceae4ddfa55c410475
          name: 'Device Uptime'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.3.0
          key: system.uptime
          delay: 1h
          history: 30d
          trends: '0'
          units: s
          description: 'The time since the network management portion of the system was last re-initialised.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: Component
              value: System
          triggers:
            - uuid: c95907d96d384661b93b159b3b97d652
              expression: 'last(/PIC Ubiquiti Firewall by SNMP/system.uptime)<{$UBIQUITI_UPTIME_MIN}'
              name: 'Device rebooted recently'
              status: DISABLED
              priority: WARNING
              description: |
                The device has restarted within the last 10 minutes.
                This could indicate planned maintenance or unexpected reboot.
              manual_close: 'YES'
              tags:
                - tag: Component
                  value: System
                - tag: Metrics
                  value: Uptime
                - tag: Symptom
                  value: Stability
        - uuid: dbd2dfee5b5c4ef2b3fbc67c4c5a526b
          name: 'CPU Utilisation'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.11.11.0
          key: ubiquiti.cpu.utilisation
          history: 30d
          value_type: FLOAT
          units: '%'
          description: 'CPU utilisation percentage over the last 1 minute.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
            - type: MULTIPLIER
              parameters:
                - '10'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: CPU
            - tag: Metrics
              value: Performance
          triggers:
            - uuid: eb62f50e2f03496eb00118b359964174
              expression: 'avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.cpu.utilisation,#5)>{$UBIQUITI_CPU_UTIL_MAX}'
              name: 'High CPU Utilisation'
              status: DISABLED
              priority: AVERAGE
              description: 'CPU utilisation exceeds {$UBIQUITI_CPU_UTIL_MAX}% averaged across 5 samples. High CPU usage may impact routing performance and responsiveness.'
              manual_close: 'YES'
              tags:
                - tag: Component
                  value: CPU
                - tag: Metrics
                  value: Utilisation
                - tag: Severity
                  value: Threshold
        - uuid: 142e485141f148f992ff7ed62b4feea9
          name: 'Memory Available'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.4.6.0
          key: ubiquiti.memory.available
          history: 30d
          units: B
          description: 'Available real memory (free physical RAM) in bytes.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: RAM
            - tag: Metrics
              value: Performance
        - uuid: 2d08e0be8f8a4c3581285d1badef0de9
          name: 'Memory Total'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.4.5.0
          key: ubiquiti.memory.total
          history: 30d
          units: B
          description: 'Total real memory (physical RAM) in bytes.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: RAM
            - tag: Metrics
              value: Performance
        - uuid: ee4aa351f10c48ff950778ae6a52afdc
          name: 'Active Sessions'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.255.10.0
          key: ubiquiti.sessions.active
          history: 30d
          description: 'Current number of active tracked sessions (e.g., via conntrack or session table). Requires custom SNMP extend.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: Firewall
            - tag: Metrics
              value: Sessions
          triggers:
            - uuid: 6a40040f960d42fabc3dd51aeb895055
              expression: 'avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.sessions.active,#5)>{$UBIQUITI_SESSION_COUNT_MAX}'
              name: 'High session count'
              status: DISABLED
              priority: AVERAGE
              description: 'High session count detected over 5 samples. May indicate scanning, DoS, or high concurrent usage.'
              tags:
                - tag: Component
                  value: Firewall
                - tag: Metrics
                  value: Sessions
        - uuid: 701f74b75c434bc6b76aa26fc0abe3d0
          name: 'Swap Available'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.4.6.0
          key: ubiquiti.swap.available
          history: 30d
          units: B
          description: 'Available swap memory in bytes.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: RAM
            - tag: Metrics
              value: Performance
        - uuid: 263c542827b14a6e9866578c6b65d95c
          name: 'Swap Total'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.4.3.0
          key: ubiquiti.swap.total
          history: 30d
          units: B
          description: 'Total swap space in bytes.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: RAM
            - tag: Metrics
              value: Performance
        - uuid: 22c7305f45e34c28addb9db818de5585
          name: 'Disk Throughput Read'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.11.6.0
          key: ubiquiti.system.io.read
          delay: 5m
          history: 30d
          units: Bps
          description: 'Disk read throughput in bytes per second.'
          preprocessing:
            - type: CHANGE_PER_SECOND
            - type: MULTIPLIER
              parameters:
                - '1024'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: IO
            - tag: Metrics
              value: Performance
        - uuid: 6370180ac7884d3abf00e50c33237cc7
          name: 'Disk Throughput Write'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.2021.11.5.0
          key: ubiquiti.system.io.write
          delay: 5m
          history: 30d
          units: Bps
          description: 'Disk write throughput in bytes per second.'
          preprocessing:
            - type: CHANGE_PER_SECOND
            - type: MULTIPLIER
              parameters:
                - '1024'
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - '3600'
          tags:
            - tag: Component
              value: IO
            - tag: Metrics
              value: Performance
      discovery_rules:
        - uuid: 8522201028d94159872dc89944915456
          name: 'Disk I/O'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#DISKINDEX},.1.3.6.1.4.1.2021.13.15.1.1.1,{#DISKDEVICE},.1.3.6.1.4.1.2021.13.15.1.1.2]'
          key: ubiquiti.diskio.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#DISKDEVICE}'
                value: '^(mmcblk0(p[0-9]+)?|zram[0-9]+)$'
          description: 'Discovers eMMC block devices (mmcblk0 and its partitions) and zram compressed swap devices via the UCD-SNMP diskIO table. Excludes loop devices, MTD block devices, and boot partitions, which carry no useful I/O metrics.'
          item_prototypes:
            - uuid: a26aed0f6f234887ad54b5a891a56028
              name: 'Disk {#DISKDEVICE} Bytes Read/s'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2021.13.15.1.1.12.{#DISKINDEX}'
              key: 'ubiquiti.diskio.read.bytes[{#DISKINDEX}]'
              delay: 2m
              history: 30d
              units: Bps
              description: 'Rate of bytes read from {#DISKDEVICE} (diskIONReadX, 64-bit counter).'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Disk
                - tag: Device
                  value: '{#DISKDEVICE}'
                - tag: Metrics
                  value: IO
            - uuid: b16bbc7af2c04a8eac3ed7e8aa4ba015
              name: 'Disk {#DISKDEVICE} Read Ops/s'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2021.13.15.1.1.5.{#DISKINDEX}'
              key: 'ubiquiti.diskio.read.ops[{#DISKINDEX}]'
              delay: 2m
              history: 30d
              description: 'Rate of read operations on {#DISKDEVICE} (diskIOReads).'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Disk
                - tag: Device
                  value: '{#DISKDEVICE}'
                - tag: Metrics
                  value: IO
            - uuid: ba7d754112ab49e78bf22ee5a574b895
              name: 'Disk {#DISKDEVICE} Bytes Written/s'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2021.13.15.1.1.13.{#DISKINDEX}'
              key: 'ubiquiti.diskio.write.bytes[{#DISKINDEX}]'
              delay: 2m
              history: 30d
              units: Bps
              description: 'Rate of bytes written to {#DISKDEVICE} (diskIONWrittenX, 64-bit counter).'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Disk
                - tag: Device
                  value: '{#DISKDEVICE}'
                - tag: Metrics
                  value: IO
            - uuid: 94d380561766439780f747e68a96af3a
              name: 'Disk {#DISKDEVICE} Write Ops/s'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.2021.13.15.1.1.6.{#DISKINDEX}'
              key: 'ubiquiti.diskio.write.ops[{#DISKINDEX}]'
              delay: 2m
              history: 30d
              description: 'Rate of write operations on {#DISKDEVICE} (diskIOWrites).'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Disk
                - tag: Device
                  value: '{#DISKDEVICE}'
                - tag: Metrics
                  value: IO
          graph_prototypes:
            - uuid: 637d153f033c459ba1b40d8b0cea19e6
              name: 'Disk {#DISKDEVICE} I/O Throughput'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'ubiquiti.diskio.read.bytes[{#DISKINDEX}]'
                - sortorder: '1'
                  color: EE4000
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'ubiquiti.diskio.write.bytes[{#DISKINDEX}]'
        - uuid: 0ea3c1089b5f40b7986c0fd08b6631d6
          name: 'Interfaces (Ethernet)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFDESCR},1.3.6.1.2.1.2.2.1.2,{#IFTYPE},1.3.6.1.2.1.2.2.1.3]'
          key: ubiquiti.interface.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFDESCR}'
                value: '^eth[0-9]+$'
              - macro: '{#IFTYPE}'
                value: ^(6|117|161)$
          description: 'Discovers physical Ethernet interfaces (eth0, eth1, etc.) via the IF-MIB interface table. Filters on ifDescr matching the eth[0-9]+ pattern and ifType values 6 (ethernetCsmacd), 117 (gigabitEthernet), or 161 (ieee8023adLag). Excludes virtual, tunnel, and bridge interfaces.'
          item_prototypes:
            - uuid: 9d8ea2b43a5b4e57add961fa87f9a1cf
              name: 'Interface: {#IFDESCR} Errors In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInErrors.{#SNMPINDEX}'
              key: 'interface.ifInErrors[{#SNMPINDEX}]'
              delay: 2m
              history: 30d
              units: Bps
              description: 'Inbound error count on interface {#IFDESCR}, converted to bits per second.no'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: Ethernet
                - tag: Metrics
                  value: Errors
                - tag: Name
                  value: '{#IFDESCR}'
              trigger_prototypes:
                - uuid: 5beca70667b84527884e259adf800a0d
                  expression: 'avg(/PIC Ubiquiti Firewall by SNMP/interface.ifInErrors[{#SNMPINDEX}],5m) > {$UBIQUITI_INTERFACE_ERROR_THRESHOLD}'
                  name: 'Interface {#IFDESCR} Inbound Errors High'
                  status: DISABLED
                  priority: AVERAGE
                  description: 'Interface {#IFDESCR} is experiencing a high number of RECEIVE errors. This may indicate bad cabling, duplex mismatch, or hardware issues.'
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: Interface
                      value: Ethernet
                    - tag: Symptoms
                      value: HighErrorCount
            - uuid: f8b53093f9d645d5a82a8f431a58fec9
              name: 'Interface: {#IFDESCR} Bytes In'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifInOctets.{#SNMPINDEX}'
              key: 'interface.ifInOctets[{#SNMPINDEX}]'
              history: 30d
              units: Bps
              description: 'Inbound traffic on interface {#IFDESCR}, in bits per second.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: Ethernet
                - tag: Metrics
                  value: Traffic
                - tag: Name
                  value: '{#IFDESCR}'
            - uuid: 960e47e6efc94e9da7a12a860e8c4bd1
              name: 'Interface: {#IFDESCR} Errors Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutErrors.{#SNMPINDEX}'
              key: 'interface.ifOutErrors[{#SNMPINDEX}]'
              delay: 2m
              history: 30d
              units: Bps
              description: 'Outbound error count on interface {#IFDESCR}, converted to bits per second.'
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: Ethernet
                - tag: Metrics
                  value: Errors
                - tag: Name
                  value: '{#IFDESCR}'
              trigger_prototypes:
                - uuid: 7637abf514b347b68ed1b2521692e23d
                  expression: 'avg(/PIC Ubiquiti Firewall by SNMP/interface.ifOutErrors[{#SNMPINDEX}],5m) > {$UBIQUITI_INTERFACE_ERROR_THRESHOLD}'
                  name: 'Interface {#IFDESCR} Outbound Errors High'
                  status: DISABLED
                  priority: AVERAGE
                  description: 'Interface {#IFDESCR} is experiencing a high number of SEND errors. This may indicate bad cabling, duplex mismatch, or hardware issues.'
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: Interface
                      value: Ethernet
                    - tag: Symptoms
                      value: HighErrorCount
            - uuid: 735fc4009f734db6bd3a6d0798876e07
              name: 'Interface: {#IFDESCR} Bytes Out'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOutOctets.{#SNMPINDEX}'
              key: 'interface.ifOutOctets[{#SNMPINDEX}]'
              history: 30d
              units: Bps
              preprocessing:
                - type: CHANGE_PER_SECOND
                - type: MULTIPLIER
                  parameters:
                    - '8'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: Ethernet
                - tag: Metrics
                  value: Traffic
                - tag: Name
                  value: '{#IFDESCR}'
            - uuid: 3ea40a8c05cf40bf84e788467e400777
              name: 'Interface: {#IFDESCR} Status'
              type: SNMP_AGENT
              snmp_oid: 'IF-MIB::ifOperStatus.{#SNMPINDEX}'
              key: 'interface.status[{#SNMPINDEX}]'
              history: 30d
              valuemap:
                name: interface.status.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Interface
                - tag: Interface
                  value: Ethernet
                - tag: Metrics
                  value: Status
                - tag: Name
                  value: '{#IFDESCR}'
              trigger_prototypes:
                - uuid: f9cc7391364948cbb1677580cc0efb4d
                  expression: 'min(/PIC Ubiquiti Firewall by SNMP/interface.status[{#SNMPINDEX}],5m) = 2'
                  name: 'Interface {#IFDESCR} status changed'
                  status: DISABLED
                  priority: WARNING
                  description: 'Detects when the interface {#IFDESCR} enters a ''down'' state at least once within the last 3 minutes. This may indicate a physical disconnect, link loss, or transient failure. Intended to suppress brief or transitional link-state flaps while still alerting on true interface outages.'
                  manual_close: 'YES'
                  tags:
                    - tag: Component
                      value: Interface
                    - tag: Interface
                      value: Ethernet
                    - tag: Symptom
                      value: Flap/Down
          graph_prototypes:
            - uuid: 613f5a70d9034032b42b0e34fcd5c541
              name: 'Interface {#IFDESCR} Traffic'
              graph_items:
                - color: 199C0D
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'interface.ifInOctets[{#SNMPINDEX}]'
                - sortorder: '1'
                  color: 00BFFF
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'interface.ifOutOctets[{#SNMPINDEX}]'
                - sortorder: '2'
                  drawtype: FILLED_REGION
                  color: FF0000
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'interface.ifInErrors[{#SNMPINDEX}]'
                - sortorder: '3'
                  drawtype: FILLED_REGION
                  color: CC6600
                  calc_fnc: ALL
                  item:
                    host: 'PIC Ubiquiti Firewall by SNMP'
                    key: 'interface.ifOutErrors[{#SNMPINDEX}]'
        - uuid: 602b329203904b8781f999be38e6f6d1
          name: Memory
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#HRSTORAGEINDEX},.1.3.6.1.2.1.25.2.3.1.1,{#HRSTORAGEDESCR},.1.3.6.1.2.1.25.2.3.1.3,{#HRSTORAGEUNIT},.1.3.6.1.2.1.25.2.3.1.4]'
          key: ubiquiti.memory.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#HRSTORAGEDESCR}'
                value: '^(Virtual memory|virtual memory|Memory buffers|memory buffers|Cached memory|cached memory|Shared memory|shared memory|Swap space|swap space)$'
          description: 'Discovers memory-related storage segments via HOST-RESOURCES-MIB::hrStorageTable. Filters for virtual memory, buffers, cache, shared memory, and swap segments. Excludes physical RAM and mounted file systems. Not supported on UCG series devices running UniFi OS 5.x or later, as hrStorageTable is not exposed by the SNMP agent on that platform.'
          item_prototypes:
            - uuid: e37bf53627c34d0faaf2557de08c6863
              name: 'Memory: {#HRSTORAGEDESCR} Total'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.5.{#HRSTORAGEINDEX}'
              key: 'ubiquiti.memory.total.bytes[{#HRSTORAGEINDEX}]'
              delay: 5m
              history: 30d
              units: B
              description: 'Total available storage memory for {#HRSTORAGEDESCR}, derived from hrStorageSize Ã— hrStorageAllocationUnits.'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Memory
                - tag: Metrics
                  value: Performance
            - uuid: bb29191f8e694afc872795fb9d0b0c34
              name: 'Memory: {#HRSTORAGEDESCR} Used'
              type: SNMP_AGENT
