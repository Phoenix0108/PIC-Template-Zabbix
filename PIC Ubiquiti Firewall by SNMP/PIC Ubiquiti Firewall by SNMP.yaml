                  value: Routing
                - tag: Route-Destination
                  value: '{#ROUTEDEST}{#ROUTEMASK}'
            - uuid: 32ab23a6f7034c84acc8de208bc6f5d0
              name: 'Route: {#ROUTEDEST}/{#ROUTEMASK} Next Hop'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.4.21.1.7.{#ROUTEDEST}'
              key: 'ubiquiti.route.nexthop[{#ROUTEDEST}/{#ROUTEMASK}]'
              delay: 15m
              history: 30d
              value_type: CHAR
              description: 'IP address of the next hop for the route to {#ROUTEDEST}/{#ROUTEMASK}. Returns 0.0.0.0 for directly connected routes (type 3).'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Routing
                - tag: Route-Destination
                  value: '{#ROUTEDEST}/{#ROUTEMASK}'
            - uuid: 5302988d43194a10912ec09d816fc774
              name: 'Route: {#ROUTEDEST}/{#ROUTEMASK} Type'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.4.21.1.8.{#ROUTEDEST}'
              key: 'ubiquiti.route.type[{#ROUTEDEST}/{#ROUTEMASK}]'
              delay: 15m
              history: 30d
              description: 'Route type per RFC 1213 ipRouteType: 1=Other, 2=Invalid/deleted, 3=Direct/connected, 4=Indirect/via gateway.'
              valuemap:
                name: route.type.valuemap
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - '3600'
              tags:
                - tag: Component
                  value: Routing
                - tag: Route-Destination
                  value: '{#ROUTEDEST}/{#ROUTEMASK}'
          trigger_prototypes:
            - uuid: d1eef868020d4ff0904853094fb0a0b8
              expression: |
                avg(/PIC Ubiquiti Firewall by SNMP/ubiquiti.route.ifindex[{#ROUTEDEST}/{#ROUTEMASK}],#5)<>last(/PIC Ubiquiti Firewall by SNMP/ubiquiti.route.ifindex[{#ROUTEDEST}/{#ROUTEMASK}])
                    or
                    last(/PIC Ubiquiti Firewall by SNMP/ubiquiti.route.nexthop[{#ROUTEDEST}/{#ROUTEMASK}])<>last(/PIC Ubiquiti Firewall by SNMP/ubiquiti.route.nexthop[{#ROUTEDEST}/{#ROUTEMASK}],#2)
              name: 'Route: {#ROUTEDEST}/{#ROUTEMASK} path changed'
              status: DISABLED
              priority: INFO
              description: |
                Detected a stable change in routing for {#ROUTEDEST}/{#ROUTEMASK}.
                The outgoing interface or next hop has altered consistently over 5 polling cycles.
                This may indicate BGP convergence, VPN tunnel drop or fallback routing.
