zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a1b2c3d4e5f64789a1234567890abcd1
      name: 'PIC informatique - Template'
    - uuid: 7df96b18c230490a9a0a9b2a14bf7178
      name: 'Templates/Network devices'
  templates:
    - uuid: 0087d6b0e40c459d9fc0242d30235184
      template: 'PIC - ICMP Ping for Maps'
      name: 'PIC - ICMP Ping for Maps'
      description: |
        Template Net ICMP Ping
        
        Generated by official Zabbix template tool "Templator"
      readme: |
        ## Setup
        
        Set `Threshold of ICMP packet loss` and `Threshold of the average ICMP response`
      groups:
        - name: 'PIC informatique - Template'
        - name: 'Templates/Network devices'
      items:
        - uuid: bfe9ecb7053344e39b216b86008259d3
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 741a55e15dce44b0a501dca77b3fa315
              expression: 'max(/PIC - ICMP Ping for Maps/icmpping,#3)=0'
              name: 'ICMP Ping: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
            - uuid: e861d7f701d642f381276f383ed2c7ca
              expression: 'max(/PIC - ICMP Ping for Maps/icmpping,#3)=0'
              name: 'Zabbix - Not receiving data for > {$PROXY_LASTACCESS_NODATA_DSTR} from proxy {HOST.HOST}'
              status: DISABLED
              priority: HIGH
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 3f5990d684ea49b399079f0dc996c3af
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: b96a097981374b39abf46c7d2baaf3c7
              expression: 'min(/PIC - ICMP Ping for Maps/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/PIC - ICMP Ping for Maps/icmppingloss,5m)<100'
              name: 'ICMP Ping: High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'ICMP Ping: Unavailable by ICMP ping'
                  expression: 'max(/PIC - ICMP Ping for Maps/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: b306e9f6de6b48928a725e27104c8d46
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 498e0e1d01704bb8a7b50a1551e786c3
              expression: 'avg(/PIC - ICMP Ping for Maps/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'ICMP Ping: High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'Average ICMP response time is too high.'
              dependencies:
                - name: 'ICMP Ping: High ICMP ping loss'
                  expression: 'min(/PIC - ICMP Ping for Maps/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/PIC - ICMP Ping for Maps/icmppingloss,5m)<100'
                - name: 'ICMP Ping: Unavailable by ICMP ping'
                  expression: 'max(/PIC - ICMP Ping for Maps/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
      tags:
        - tag: class
          value: network
        - tag: target
          value: icmp
      macros:
        - macro: '{$ICMP_LOSS_WARN}'
          value: '20'
          description: 'Warning threshold of ICMP packet loss in %.'
          config:
            type: TEXT
            priority: '1'
            section_name: Thresholds
            label: 'Threshold of ICMP packet loss'
            description: 'Warning threshold of ICMP packet loss in %. In the range from 0 to 100 inclusive.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
        - macro: '{$ICMP_RESPONSE_TIME_WARN}'
          value: '0.15'
          description: 'Warning threshold of the average ICMP response time in seconds.'
          config:
            type: TEXT
            priority: '2'
            section_name: Thresholds
            label: 'Threshold of the average ICMP response'
            description: 'Warning threshold of the average ICMP response time in seconds. No less than 0.'
            regex: '^-?([0-9]+|(([0-9]+)\.([0-9]+)))$'
      valuemaps:
        - uuid: cf34fca178434adba1954d2fbed50384
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
