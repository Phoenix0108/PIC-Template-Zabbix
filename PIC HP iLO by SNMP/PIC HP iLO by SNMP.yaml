  triggers:
    - uuid: c0a72981cf7d445daa96b5a78609c4f4
      expression: '(last(/PIC HP iLO by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/PIC HP iLO by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/PIC HP iLO by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/PIC HP iLO by SNMP/system.net.uptime[sysUpTime.0])<10m)'
      name: 'HP iLO: Host has been restarted'
      event_name: 'HP iLO: {HOST.NAME} has been restarted (uptime < 10m)'
      status: DISABLED
      priority: WARNING
      description: 'Uptime is less than 10 minutes.'
      manual_close: 'YES'
      dependencies:
        - name: 'HP iLO: No SNMP data collection'
          expression: 'max(/PIC HP iLO by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
      tags:
        - tag: scope
          value: notice
