        - uuid: b87c25b2368b46b2afb1bbcfdda1eca6
          name: 'VPN tunnel discovery'
          type: DEPENDENT
          key: vpn.tunnel.discovery
          filter:
            evaltype: AND
            conditions:
              - macro: '{#VPN.NAME}'
                value: '{$VPN.NAME.MATCHES}'
              - macro: '{#VPN.NAME}'
                value: '{$VPN.NAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Used for discovering VPN tunnels from FORTINET-FORTIGATE-MIB.'
          item_prototypes:
            - uuid: a9a8336b24214ab99519ffafa869f78c
              name: 'VPN {#VPN.NAME}: Tunnel Status'
              type: DEPENDENT
              key: 'vpn.tunnel.status[fgVpnTunEntStatus.{#SNMPINDEX}]'
              description: |
                MIB: FORTINET-FORTIGATE-MIB
                Current status of tunnel (up or down).
              valuemap:
                name: 'VPN status'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.12356.101.12.2.2.1.20.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: vpn.tunnel.walk
              tags:
                - tag: component
                  value: vpn
                - tag: tunnel
                  value: '{#VPN.NAME}'
              trigger_prototypes:
                - uuid: bae918fcceea4a598b4f7ded14bc2da1
                  expression: '{$VPN.STATE.CONTROL:"{#VPN.NAME}"}=1 and last(/PIC FortiGate by SNMP/vpn.tunnel.status[fgVpnTunEntStatus.{#SNMPINDEX}])=1 and (last(/PIC FortiGate by SNMP/vpn.tunnel.status[fgVpnTunEntStatus.{#SNMPINDEX}],#1)<>last(/PIC FortiGate by SNMP/vpn.tunnel.status[fgVpnTunEntStatus.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/PIC FortiGate by SNMP/vpn.tunnel.status[fgVpnTunEntStatus.{#SNMPINDEX}])<>1 or {$VPN.STATE.CONTROL:"{#VPN.NAME}"}=0'
                  name: 'FortiGate: VPN {#VPN.NAME}: Tunnel down'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the current tunnel state is down.
                    2. `{$VPN.STATE.CONTROL}=1` - a user can redefine the context macro to "0", marking this notification as not important. No new trigger will be fired if this tunnel is down.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
          master_item:
            key: vpn.tunnel.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#VPN.NAME}'
                - 1.3.6.1.4.1.12356.101.12.2.2.1.3
                - '0'
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
