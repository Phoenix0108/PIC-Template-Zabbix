        - uuid: 7259884da14f4bc6a53aa3096f4648b0
          name: 'HA load-balancing schedule'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.101.13.1.6.0
          key: 'ha.schedule[fgHaSchedule.0]'
          delay: 1h
          description: |
            MIB: FORTINET-FORTIGATE-MIB
