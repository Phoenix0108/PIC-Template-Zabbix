                  value: '{#CPU.ID}'
            - uuid: 90b997368c9d4983b3613800f79c3253
              name: 'CPU Core {#CPU.ID}: Average user usage over 1min'
              type: DEPENDENT
              key: 'system.cpu.usage[fgProcessorUserUsage.{#SNMPINDEX}]'
              value_type: FLOAT
              units: '%'
              description: |
                MIB: FORTINET-FORTIGATE-MIB
                The processor's CPU user space usage, expressed as an average calculated over the last minute.
                (Only valid for processor types that support this statistic.)
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.12356.101.4.4.2.1.9.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: system.cpu.walk
              tags:
                - tag: component
                  value: cpu
                - tag: processor
                  value: '{#CPU.ID}'
          graph_prototypes:
            - uuid: 8f7f675b3e7e463c871c40371a9c15ea
              name: 'CPU Core {#CPU.ID}: Average usage per core'
              ymin_type_1: FIXED
              ymax_type_1: FIXED
              graph_items:
                - color: 199C0D
                  item:
                    host: 'PIC FortiGate by SNMP'
                    key: 'system.cpu.usage[fgProcessorUsage.{#SNMPINDEX}]'
                - sortorder: '1'
                  color: F63100
                  item:
                    host: 'PIC FortiGate by SNMP'
                    key: 'system.cpu.usage[fgProcessorUserUsage.{#SNMPINDEX}]'
                - sortorder: '2'
                  color: 00611C
                  item:
                    host: 'PIC FortiGate by SNMP'
                    key: 'system.cpu.usage[fgProcessorSysUsage.{#SNMPINDEX}]'
          master_item:
            key: system.cpu.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#CPU.ID}'
                - 1.3.6.1.4.1.12356.101.4.4.2.1.1
                - '0'
                - '{#CPU.TYPE}'
                - 1.3.6.1.4.1.12356.101.4.4.2.1.4
                - '0'
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
