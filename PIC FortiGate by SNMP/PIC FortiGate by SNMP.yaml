          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: cpu
        - uuid: 0d25aec6849440a7bb4c21f9a054bd5e
          name: 'CPU utilization'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.101.4.1.3.0
          key: 'system.cpu.util[fgSysCpuUsage.0]'
          value_type: FLOAT
          units: '%'
          description: |
            MIB: FORTINET-FORTIGATE-MIB
            CPU utilization in %.
          tags:
            - tag: component
              value: cpu
          triggers:
            - uuid: 273cacb14aa64850be39b5287c422e64
              expression: 'min(/PIC FortiGate by SNMP/system.cpu.util[fgSysCpuUsage.0],5m)>{$CPU.UTIL.CRIT}'
              name: 'FortiGate: High CPU utilization'
              event_name: 'FortiGate: High CPU utilization (over {$CPU.UTIL.CRIT}% for 5m)'
              opdata: 'Current utilization: {ITEM.LASTVALUE1}'
              status: DISABLED
              priority: WARNING
              description: 'The CPU utilization is too high. The system might be slow to respond.'
              tags:
                - tag: scope
                  value: performance
        - uuid: a987e1ef3bc64435adf73c33838d6f8f
          name: 'SNMP walk CPU'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.12356.101.4.4.2.1]'
          key: system.cpu.walk
          history: '0'
          value_type: TEXT
          description: 'Used for discovering CPU from FORTINET-FORTIGATE-MIB.'
          tags:
            - tag: component
              value: raw
        - uuid: 97300335de9c4716a688a29b3b2b1c57
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should include the full name and version identification of the system's hardware type, software operating system, and networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 5a49fb87fa434182b7d32f624b870275
          name: 'Firmware version'
