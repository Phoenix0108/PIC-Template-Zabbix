              parameters:
                - 1d
          tags:
            - tag: component
              value: ha
        - uuid: ee3e0083d96c41aabcf8e304d4e4b02d
          name: 'SNMP walk hardware sensors'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.12356.101.4.3.2.1]'
          key: hw.sensor.walk
          history: '0'
          value_type: TEXT
          description: 'Used for discovering hardware sensors from FORTINET-FORTIGATE-MIB.'
          tags:
            - tag: component
              value: raw
        - uuid: 52c0f0d805b0492189a897e721a8215a
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          description: |
            Host accessibility by ICMP.
            0 - ICMP ping failed.
            1 - ICMP ping successful.
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: e907d397bb614b8ab3ffe53e71f5ddb5
              expression: 'max(/PIC FortiGate by SNMP/icmpping,#3)=0'
              name: 'FortiGate: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout. Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: aca3c6bc67fb43a1b23c7e11c08496bb
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          description: 'Percentage of lost packets.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 70e017e97c934ddf920c8e137b10af45
              expression: 'min(/PIC FortiGate by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/PIC FortiGate by SNMP/icmppingloss,5m)<100'
              name: 'FortiGate: High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              status: DISABLED
              priority: WARNING
              description: 'ICMP ping loss detected.'
              dependencies:
                - name: 'FortiGate: Unavailable by ICMP ping'
                  expression: 'max(/PIC FortiGate by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: cd98e85da6f74df680146bdf85825cf0
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          description: 'ICMP ping response time (in seconds).'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: c0f5aeae7b1641f08a07a9d472d0d337
              expression: 'avg(/PIC FortiGate by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'FortiGate: High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              status: DISABLED
              priority: WARNING
              description: 'Average ICMP response time is too high.'
              dependencies:
                - name: 'FortiGate: High ICMP ping loss'
                  expression: 'min(/PIC FortiGate by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/PIC FortiGate by SNMP/icmppingloss,5m)<100'
                - name: 'FortiGate: Unavailable by ICMP ping'
                  expression: 'max(/PIC FortiGate by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 7e636654e6bf4249b73c90e601a652b8
          name: 'Blocked intrusions'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.101.9.2.1.1.2.1
          key: 'ips.blocked[fgIpsIntrusionsBlocked.0]'
