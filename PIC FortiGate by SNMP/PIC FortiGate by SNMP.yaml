            - uuid: 0d65adee923a418e8c825cdb6b044db7
              name: 'SD-WAN [{#HNAME}]:[{#IFNAME}]: Health check state'
              type: DEPENDENT
              key: 'sdwan_health.state[fgVWLHealthCheckLinkState.{#SNMPINDEX}]'
              trends: '0'
              description: |
                MIB: FORTINET-FORTIGATE-MIB
                Health check state on a specific member link.
              valuemap:
                name: 'Health check state'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.12356.101.4.9.2.1.4.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: sdwan_health.walk
              tags:
                - tag: component
                  value: sd-wan
                - tag: health-check
                  value: '{#HNAME}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 84fac72ee23f449ba483e4ec159aac47
                  expression: '{$SDWAN.HEALTH.IF.CONTROL:"{#HNAME}"}=1 and last(/PIC FortiGate by SNMP/sdwan_health.state[fgVWLHealthCheckLinkState.{#SNMPINDEX}])=1 and (last(/PIC FortiGate by SNMP/sdwan_health.state[fgVWLHealthCheckLinkState.{#SNMPINDEX}],#1)<>last(/PIC FortiGate by SNMP/sdwan_health.state[fgVWLHealthCheckLinkState.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/PIC FortiGate by SNMP/sdwan_health.state[fgVWLHealthCheckLinkState.{#SNMPINDEX}])<>2 or {$SDWAN.HEALTH.IF.CONTROL:"{#HNAME}"}=0'
                  name: 'FortiGate: SD-WAN [{#HNAME}]:[{#IFNAME}]: Health check state is dead'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the health check state is dead.
                    2. `{$SDWAN.HEALTH.IF.CONTROL:"{#HNAME}"}=1` - a user can redefine the context macro to "0", marking this health check as not important. No new trigger will be fired if this health check is dead.
                    3. `{TEMPLATE_NAME:METRIC.diff()}=1` - the trigger fires only if the health check state was up to "1" sometime before.
                    
                    WARNING: If closed manually, it will not fire again on the next poll because of `diff`.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
