zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a1b2c3d4e5f64789a1234567890abcd1
      name: 'PIC informatique - Template'
    - uuid: 7df96b18c230490a9a0a9b2a14bf7178
      name: 'Templates/Network devices'
  templates:
    - uuid: fd2e0b0b91824df7804354a1fd32c21b
      template: 'PIC FortiGate by SNMP'
      name: 'PIC FortiGate by SNMP'
      description: |
        The template for monitoring FortiGate firewall by SNMP.
        
        MIBs used:
        HOST-RESOURCES-MIB
        FORTINET-FORTIGATE-MIB
        FORTINET-CORE-MIB
        SNMPv2-MIB
        IF-MIB
        
        Generated by official Zabbix template tool "Templator"
      groups:
        - name: 'PIC informatique - Template'
        - name: 'Templates/Network devices'
      items:
        - uuid: e3d71445917849febb42d6d32abe9b23
          name: 'HA config sync'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.101.13.1.5.0
          key: 'ha.auto.sync[fgHaAutoSync.0]'
          delay: 1h
          description: |
            MIB: FORTINET-FORTIGATE-MIB
            Configuration of an automatic configuration synchronization (enabled or disabled).
          valuemap:
            name: 'HA option status'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: ha
        - uuid: 22ede8c0ab8140959276afe21297eeff
          name: 'HA cluster group ID'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.101.13.1.2.0
          key: 'ha.cluster.group_id[fgHaGroupId.0]'
          delay: 1h
          trends: '0'
          description: |
            MIB: FORTINET-FORTIGATE-MIB
            HA cluster group ID device is configured for.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: ha
        - uuid: f9ae6401a8e64998ab53831693a7fc4a
          name: 'HA cluster group name'
