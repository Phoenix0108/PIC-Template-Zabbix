              value: system
        - uuid: 265b5c991f844be7be7febbb8554f5dd
          name: 'Hardware model name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.47.1.2.1.1.2.1
          key: system.hw.model
          delay: 1h
          value_type: CHAR
          description: |
            MIB: ENTITY-MIB
            Model of the device.
          inventory_link: MODEL
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: 40a551040419420e91b0f554a28b38f0
          name: 'Hardware serial number'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.47.1.1.1.1.11.1
          key: system.hw.serialnumber
          delay: 1h
          value_type: CHAR
          description: |
            MIB: ENTITY-MIB
            Serial number of the device.
          inventory_link: SERIALNO_A
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 9914b25de19c45afa2634b73d2b1069c
              expression: |
                last(/PIC FortiGate by SNMP/system.hw.serialnumber,#1)<>last(/PIC FortiGate by SNMP/system.hw.serialnumber,#2) and
                length(last(/PIC FortiGate by SNMP/system.hw.serialnumber))>0
              name: 'FortiGate: Device has been replaced'
              event_name: 'FortiGate: Device has been replaced (new serial number received)'
              status: DISABLED
              priority: INFO
              description: 'Device serial number has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: e40e011959e941d2a490adb96d889c36
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.6.0
          key: 'system.location[sysLocation.0]'
          delay: 15m
