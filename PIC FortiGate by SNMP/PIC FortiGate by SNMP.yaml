      discovery_rules:
        - uuid: c6b4697ca2af434583a84c7e25984bfd
          name: 'CPU discovery'
          type: DEPENDENT
          key: cpu.discovery
          filter:
            conditions:
              - macro: '{#CPU.TYPE}'
                value: 12356.101.4.4.3.1
              - macro: '{#CPU.TYPE}'
                value: 12356.101.4.4.3.2
              - macro: '{#CPU.TYPE}'
                value: 12356.101.4.4.3.3
          description: 'Used for discovering CPUs from FORTINET-FORTIGATE-MIB.'
          item_prototypes:
            - uuid: 6b44b9a43ef94d89a68a4d14a70cbfd8
              name: 'CPU Core {#CPU.ID}: Average system usage over 1min'
              type: DEPENDENT
              key: 'system.cpu.usage[fgProcessorSysUsage.{#SNMPINDEX}]'
              value_type: FLOAT
              units: '%'
              description: |
                MIB: FORTINET-FORTIGATE-MIB
                The processor's CPU system space usage, expressed as an average calculated over the last minute.
                (Only valid for processor types that support this statistic.)
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.12356.101.4.4.2.1.10.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: system.cpu.walk
              tags:
                - tag: component
                  value: cpu
                - tag: processor
                  value: '{#CPU.ID}'
            - uuid: 93ff1492525e43f9a7a38ccddf99435c
              name: 'CPU Core {#CPU.ID}: Average usage over 1min'
              type: DEPENDENT
              key: 'system.cpu.usage[fgProcessorUsage.{#SNMPINDEX}]'
              value_type: FLOAT
              units: '%'
              description: |
                MIB: FORTINET-FORTIGATE-MIB
                The processor's CPU usage in %, expressed as an average calculated over the last minute.
                (Only valid for processor types that support this statistic.)
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.12356.101.4.4.2.1.2.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: system.cpu.walk
              tags:
