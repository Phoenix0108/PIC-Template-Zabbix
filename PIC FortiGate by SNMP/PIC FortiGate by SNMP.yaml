                - 12h
          tags:
            - tag: component
              value: system
        - uuid: a3fa299631a24c42893b933204f13ab5
          name: 'Number of CPUs'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.101.4.4.1.0
          key: system.cpu.num
          description: |
            MIB: FORTINET-FORTIGATE-MIB
