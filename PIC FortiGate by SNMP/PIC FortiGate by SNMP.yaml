                - tag: scope
                  value: capacity
                - tag: scope
                  value: performance
            - uuid: 47a37e3c5c4f4d1da4c5fa3b17862181
              expression: 'last(/PIC FortiGate by SNMP/vfs.fs.pfree)<{$DISK.FREE.CRIT}'
