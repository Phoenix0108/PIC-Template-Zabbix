            - uuid: 576d5e3567604bb6a48547e069b9e08b
              name: 'WTP {#WC.NAME}: Connection status'
              type: DEPENDENT
              key: 'wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}]'
              trends: '0'
              description: |
                MIB: FORTINET-FORTIGATE-MIB
                Represents the connection status of a WTP to the AC.
                
                The following enumerated values are supported:
                `offLine(1)` - The WTP is not connected.
                `onLine(2)` - The WTP is connected.
                `downloadingImage(3)` - The WTP is downloading software image from the AC on joining.
                `connectedImage(4)` - The AC is pushing a software image to the connected WTP.
                `other(0)` - The WTP connection status is unknown.
              valuemap:
                name: 'Wireless connection status'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.12356.101.14.4.4.1.7.{#SNMPINDEX}'
                    - '0'
              master_item:
                key: wireless.ap.walk
              tags:
                - tag: access-point
                  value: '{#WC.NAME}'
                - tag: component
                  value: wireless
              trigger_prototypes:
                - uuid: a415fbb2aa3449d4ad56ecd4db44b792
                  expression: '{$WC.STATE.CONTROL:"{#WC.NAME}"}=1 and last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}])=1 and (last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}],#1)<>last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}])=2 or {$WC.STATE.CONTROL:"{#WC.NAME}"}=0'
                  name: 'FortiGate: WTP {#WC.NAME}: Connection is down'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  priority: HIGH
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the current connection status is `offLine`.
                    2. `{$WC.STATE.CONTROL}=1` - a user can redefine the context macro to "0", marking this notification as not important. No new trigger will be fired if this connection is down.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
                - uuid: 57863deeea9a446dae32af7e481031e9
                  expression: '{$WC.UPDATE.CONTROL:"{#WC.NAME}"}=1 and last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}])=3 and (last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}],#1)<>last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}])=2 or {$WC.UPDATE.CONTROL:"{#WC.NAME}"}=0'
                  name: 'FortiGate: WTP {#WC.NAME}: Receiving firmware update'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  priority: INFO
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the current connection status is `downloadingImage`.
                    2. `{$WC.UPDATE.CONTROL}=1` - a user can redefine the context macro to "0", marking this notification as not important. No new trigger will be fired if the status is `downloadingImage`.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
                - uuid: a1c332e9218b417fbea10922373e9ae0
                  expression: '{$WC.UPDATE.CONTROL:"{#WC.NAME}"}=1 and last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}])=4 and (last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}],#1)<>last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}],#2))'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/PIC FortiGate by SNMP/wc.conn.status[fgWcWtpSessionConnectionState.{#SNMPINDEX}])=2 or {$WC.UPDATE.CONTROL:"{#WC.NAME}"}=0'
                  name: 'FortiGate: WTP {#WC.NAME}: Sending firmware update'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  status: DISABLED
                  priority: INFO
                  description: |
                    This trigger expression works as follows:
                    1. It can be triggered if the current connection status is `connectedImage`.
                    2. `{$WC.UPDATE.CONTROL}=1` - a user can redefine the context macro to "0", marking this notification as not important. No new trigger will be fired if the status is `connectedImage`.
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: notice
            - uuid: 176c3dc8e615454a925a04b19560e5be
