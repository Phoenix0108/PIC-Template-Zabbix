                - 1.3.6.1.2.1.2.2.1.3
                - '0'
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: 7478f3ddd97648b2864e476aca97c1ac
          name: 'SD-WAN health-check discovery'
