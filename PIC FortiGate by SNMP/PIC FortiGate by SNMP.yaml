          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: ha
        - uuid: be0626e3da744933b1527d6681aa2454
          name: 'HA cluster primary override'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.12356.101.13.1.4.0
          key: 'ha.cluster.override[fgHaOverride.0]'
          delay: 1h
          description: |
            MIB: FORTINET-FORTIGATE-MIB
            Status of the primary override flag.
          valuemap:
            name: 'HA option status'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: ha
        - uuid: df02ae9e312046c1b757cf6e7db3faa9
