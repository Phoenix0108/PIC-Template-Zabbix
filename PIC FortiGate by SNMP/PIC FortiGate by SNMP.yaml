        - uuid: 9684d16a6cc14f559de2d96bd0cfb9d0
          name: 'SNMP walk SD-WAN health-checks'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.12356.101.4.9.2.1]'
