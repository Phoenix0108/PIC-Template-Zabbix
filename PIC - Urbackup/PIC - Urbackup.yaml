            - uuid: 431597ff1bf84e4c98244bb5dbac219c
              name: 'UrBackup: [{#CLIENT_NAME}] Âge des backups'
              graph_items:
                - color: EE0000
                  item:
                    host: 'PIC - Urbackup'
                    key: 'urbackup.client.last_backup_age[{#CLIENT_NAME}]'
                - sortorder: '1'
                  color: F5A623
                  item:
                    host: 'PIC - Urbackup'
                    key: 'urbackup.client.last_image_age[{#CLIENT_NAME}]'
          master_item:
            key: urbackup.http.master
          lld_macro_paths:
            - lld_macro: '{#CLIENT_ID}'
              path: $.id
            - lld_macro: '{#CLIENT_IP}'
              path: $.ip
            - lld_macro: '{#CLIENT_NAME}'
              path: $.name
            - lld_macro: '{#FILE_DISABLED}'
              path: $.file_disabled
            - lld_macro: '{#IMAGE_DISABLED}'
              path: $.image_disabled
            - lld_macro: '{#IS_SERVER}'
              path: $.is_server
            - lld_macro: '{#OS_SIMPLE}'
              path: $.os_simple
            - lld_macro: '{#OS_VERSION}'
              path: $.os_version_string
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status.status
        - uuid: b538fd93613f413f819de7fafba52b07
          name: 'UrBackup: Découverte utilisation disque'
          type: DEPENDENT
          key: urbackup.disk.discovery
          filter:
            evaltype: OR
            conditions:
              - macro: '{#CLIENT_NAME}'
                value: '{$URBACKUP_SERVER_NAMES}'
              - macro: '{#IS_SERVER}'
                value: ^1$
          lifetime: 3d
          description: |
            Règle LLD découvrant les clients pour la supervision de l'utilisation disque.
            Même filtre que la découverte clients : serveurs/Linux uniquement (is_server=1)
            ou clients correspondant à {$URBACKUP_SERVER_NAMES}.
            Les données de stockage proviennent de l'endpoint /x?a=usage.
          item_prototypes:
            - uuid: 1f2206cc2af04250a32affd5fba97898
              name: 'UrBackup: [{#CLIENT_NAME}] Stockage backups fichiers'
              type: DEPENDENT
              key: 'urbackup.disk.files[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              units: B
              description: |
                Espace disque occupé par les backups fichiers de {#CLIENT_NAME} sur le serveur UrBackup (en octets).
                Inclut tous les backups incrémentaux et complets conservés selon la politique de rétention.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.usage.usage[?(@.name=="{#CLIENT_NAME}")].files.first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: disk
            - uuid: 661fd5c8167b4ca6809c3972121fc9fd
              name: 'UrBackup: [{#CLIENT_NAME}] Stockage backups images'
              type: DEPENDENT
              key: 'urbackup.disk.images[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              units: B
              description: |
                Espace disque occupé par les backups image de {#CLIENT_NAME} sur le serveur UrBackup (en octets).
                Les backups image (snapshots disque) sont généralement plus volumineux que les backups fichiers.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.usage.usage[?(@.name=="{#CLIENT_NAME}")].images.first()'
                  error_handler: CUSTOM_VALUE
                  error_handler_params: '0'
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: disk
            - uuid: 51cfcecfc5444843b0aa51c79f7d7b34
              name: 'UrBackup: [{#CLIENT_NAME}] Stockage total'
              type: DEPENDENT
              key: 'urbackup.disk.total[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              units: B
              description: |
                Espace disque total occupé par {#CLIENT_NAME} sur le serveur UrBackup (fichiers + images, en octets).
                Calculé en JavaScript car l'API ne fournit pas directement ce total.
                Utile pour identifier les clients qui consomment le plus d'espace de stockage.
              preprocessing:
                - type: JAVASCRIPT
                  parameters:
                    - |
                      // Calcul du stockage total = fichiers + images pour le client {#CLIENT_NAME}.
                      // L'API /x?a=usage retourne des entrées séparées pour files et images.
                      // JSONPath ne permet pas l'addition directe — ce preprocessing JS le fait.
                      try {
                        var d = JSON.parse(value);
                        var usage = d.usage && d.usage.usage ? d.usage.usage : [];
                        for (var i=0; i<usage.length; i++) {
                          if (usage[i].name === '{#CLIENT_NAME}') {
                            return (usage[i].files||0) + (usage[i].images||0);
                          }
                        }
                        return 0;
                      } catch(e) { return 0; }
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: disk
          graph_prototypes:
            - uuid: afc1a0f0439147939e5535df875bad08
              name: 'UrBackup: [{#CLIENT_NAME}] Utilisation disque'
              graph_items:
                - color: EE0000
                  item:
                    host: 'PIC - Urbackup'
                    key: 'urbackup.disk.files[{#CLIENT_NAME}]'
                - sortorder: '1'
                  color: 2774A4
                  item:
                    host: 'PIC - Urbackup'
                    key: 'urbackup.disk.images[{#CLIENT_NAME}]'
          master_item:
            key: urbackup.http.master
          lld_macro_paths:
            - lld_macro: '{#CLIENT_ID}'
              path: $.id
            - lld_macro: '{#CLIENT_NAME}'
              path: $.name
            - lld_macro: '{#IS_SERVER}'
              path: $.is_server
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.usage.usage
              error_handler: CUSTOM_VALUE
              error_handler_params: '[]'
      tags:
