              value: jobs
            - tag: scope
              value: backup-status
          triggers:
            - uuid: 0e94efb0ad09429fa1688d2177c07ebf
              expression: 'last(/PIC - Urbackup/urbackup.server.file.failures.offline)>0'
              name: 'UrBackup: {ITEM.LASTVALUE1} serveur(s)/Linux HORS LIGNE avec backup fichier en échec'
              priority: AVERAGE
              description: |
                {ITEM.LASTVALUE1} serveur(s) ou machine(s) Linux HORS LIGNE ont leur dernier backup fichier en échec.
                
                Serveurs concernés :
                {{?last(/{HOST.HOST}/urbackup.server.file.failures.offline.list)}}
                
                Sévérité AVERAGE (et non HIGH) : ces serveurs sont actuellement éteints / injoignables,
                ils ne peuvent donc pas être sauvegardés. La situation est attendue tant que la machine
                reste hors ligne. Lorsqu'un serveur en échec passe hors ligne, il bascule du compteur
                HIGH "serveurs en ligne" vers ce compteur AVERAGE : le trigger HIGH se résout et le
                ticket GLPI associé est fermé.
                
                Actions :
                  - Confirmer que l'arrêt du/des serveur(s) est volontaire (maintenance, mise hors service)
                  - Si le serveur doit rester en service : le rallumer pour reprendre les backups
                  - Si le serveur est décommissionné : supprimer le client dans UrBackup
              tags:
                - tag: component
                  value: jobs
                - tag: scope
                  value: backup-status
        - uuid: 80757add21f24d03a1affc46afa65682
          name: 'UrBackup: Liste serveurs/Linux hors ligne avec backup fichier en échec'
