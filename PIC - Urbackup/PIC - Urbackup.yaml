      macros:
        - macro: '{$URBACKUP_BACKUP_AGE_HIGH}'
          value: '172800'
          description: 'Seuil HIGH âge dernier backup fichier en secondes (défaut : 48h)'
        - macro: '{$URBACKUP_BACKUP_AGE_HIGH_LABEL}'
