zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a1b2c3d4e5f64789a1234567890abcd1
      name: 'PIC informatique - Template'
    - uuid: bd3b750094ff47a992de78eb656b90ea
      name: Templates/Applications
  templates:
    - uuid: e9a6dc928e884bf9b27f8fa396780586
      template: 'PIC - Urbackup'
      name: 'PIC - Urbackup'
      description: |
        ## Template UrBackup — HTTP Agent pur, sans script externe
        Collecte via l'API HTTP UrBackup :55414 entièrement depuis Zabbix.
        L'authentification challenge-response (PBKDF2-HMAC-SHA256 ou MD5 legacy) est gérée
        par un item SCRIPT JavaScript embarqué (Duktape ES5).
        
        ### Architecture
        - Un item maître SCRIPT collecte toutes les données en une seule exécution (toutes les 5 min)
        - Tous les autres items sont DEPENDENT et extraient leurs valeurs via JSONPath
        - Deux règles LLD : découverte des clients serveurs/Linux + utilisation disque
        
        ### Supervision
        - Statut en ligne/hors ligne de tous les clients
        - Échecs backup fichiers (distingués serveurs/Linux vs postes de travail)
        - Échecs backup images
        - Âge des derniers backups (fichier + image) par client serveur/Linux
        - Utilisation disque par client serveur/Linux
        - Backups en cours
        
        ### Prérequis
        - Zabbix 7.4+ (item SCRIPT avec timeout configurable par item)
        - UrBackup Server 2.4+ avec API HTTP active (port 55414)
        - Réseau : Zabbix Server/Proxy doit joindre {$URBACKUP_SERVER}:{$URBACKUP_PORT}
        
        ### Sécurité
        - {$URBACKUP_PASS} déclaré en SECRET_TEXT → masqué dans l'UI Zabbix
        - Utilisateur UrBackup dédié lecture seule recommandé
        - Aucun fichier de credential sur le système de fichiers
      groups:
        - name: 'PIC informatique - Template'
        - name: Templates/Applications
      items:
        - uuid: 7f5e1a5f8eaf4441928a0bc7cff92f42
          name: 'UrBackup: Backups en cours'
          type: DEPENDENT
          key: urbackup.backups.running
          history: 30d
          trends: 90d
          description: |
            Nombre de jobs de sauvegarde actuellement en cours d'exécution sur le serveur UrBackup.
            Une valeur élevée persistante peut indiquer des backups bloqués ou un serveur surchargé.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.backups_running
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: jobs
        - uuid: abcac6c758204b39a7d4f14fa73e0caa
          name: 'UrBackup: Clients hors ligne'
          type: DEPENDENT
          key: urbackup.clients.offline
          history: 30d
          trends: 90d
          description: |
            Nombre de clients UrBackup actuellement hors ligne (injoignables par le serveur).
            Comprend tous les types de clients : serveurs, Linux, postes de travail Windows.
            Un client hors ligne ne peut pas effectuer de backup.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.clients_offline
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: clients
        - uuid: 7b47bce2510e4517926cb93f442d34dd
          name: 'UrBackup: Clients en ligne'
          type: DEPENDENT
          key: urbackup.clients.online
          history: 30d
          trends: 90d
          description: |
            Nombre de clients UrBackup actuellement en ligne (joignables par le serveur).
            Comprend tous les types de clients : serveurs, Linux, postes de travail Windows.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.clients_online
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: clients
        - uuid: 22b999b0f6e14fb98444e05704a05b13
          name: 'UrBackup: Clients configurés (total)'
          type: DEPENDENT
          key: urbackup.clients.total
          history: 30d
          trends: 90d
          description: |
            Nombre total de clients enregistrés dans UrBackup, quelle que soit leur disponibilité.
            Une diminution inattendue peut indiquer la suppression accidentelle d'un client.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.clients_total
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: clients
        - uuid: bebcd36cc8fd4728a8fa5824fdad6bc8
          name: 'UrBackup: Données brutes (master)'
          type: SCRIPT
          key: urbackup.http.master
          delay: 5m
          history: 2h
          value_type: TEXT
          params: |
            // ================================================================
            // UrBackup Collector — Zabbix Script item
            // Duktape ES5 / Zabbix 7.4  —  timeout : 60s
            // Auth : PBKDF2-HMAC-SHA256 (pbkdf2_rounds > 0) ou MD5 legacy
            // ================================================================
            
            // ---- MD5 pur ES5 -----------------------------------------------
            // Implémentation complète de l'algorithme MD5 en JavaScript ES5 pur.
            // Utilisé pour : hash du mot de passe (salt+pass) et hash final (rnd+derivedKey).
            // Duktape (moteur JS de Zabbix) ne fournit pas de module crypto natif.
            function md5(str) {
              function safeAdd(x,y){var lsw=(x&0xffff)+(y&0xffff);return((x>>16)+(y>>16)+(lsw>>16))<<16|lsw&0xffff;}
              function rol(n,c){return n<<c|n>>>32-c;}
              function cmn(q,a,b,x,s,t){return safeAdd(rol(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
              function ff(a,b,c,d,x,s,t){return cmn(b&c|~b&d,a,b,x,s,t);}
              function gg(a,b,c,d,x,s,t){return cmn(b&d|c&~d,a,b,x,s,t);}
              function hh(a,b,c,d,x,s,t){return cmn(b^c^d,a,b,x,s,t);}
              function ii(a,b,c,d,x,s,t){return cmn(c^(b|~d),a,b,x,s,t);}
              var nb=((str.length+8)>>6)+1,bl=[],i;
              for(i=0;i<nb*16;i++)bl[i]=0;
              for(i=0;i<str.length;i++)bl[i>>2]|=str.charCodeAt(i)<<(i%4)*8;
              bl[i>>2]|=0x80<<(i%4)*8; bl[nb*16-2]=str.length*8;
              var a=1732584193,b=-271733879,c=-1732584194,d=271733878;
              for(i=0;i<bl.length;i+=16){
                var aa=a,bb=b,cc=c,dd=d;
                a=ff(a,b,c,d,bl[i+0],7,-680876936);  d=ff(d,a,b,c,bl[i+1],12,-389564586);
                c=ff(c,d,a,b,bl[i+2],17,606105819);  b=ff(b,c,d,a,bl[i+3],22,-1044525330);
                a=ff(a,b,c,d,bl[i+4],7,-176418897);  d=ff(d,a,b,c,bl[i+5],12,1200080426);
                c=ff(c,d,a,b,bl[i+6],17,-1473231341);b=ff(b,c,d,a,bl[i+7],22,-45705983);
                a=ff(a,b,c,d,bl[i+8],7,1770035416);  d=ff(d,a,b,c,bl[i+9],12,-1958414417);
                c=ff(c,d,a,b,bl[i+10],17,-42063);    b=ff(b,c,d,a,bl[i+11],22,-1990404162);
                a=ff(a,b,c,d,bl[i+12],7,1804603682); d=ff(d,a,b,c,bl[i+13],12,-40341101);
                c=ff(c,d,a,b,bl[i+14],17,-1502002290);b=ff(b,c,d,a,bl[i+15],22,1236535329);
                a=gg(a,b,c,d,bl[i+1],5,-165796510);  d=gg(d,a,b,c,bl[i+6],9,-1069501632);
                c=gg(c,d,a,b,bl[i+11],14,643717713); b=gg(b,c,d,a,bl[i+0],20,-373897302);
                a=gg(a,b,c,d,bl[i+5],5,-701558691);  d=gg(d,a,b,c,bl[i+10],9,38016083);
                c=gg(c,d,a,b,bl[i+15],14,-660478335);b=gg(b,c,d,a,bl[i+4],20,-405537848);
                a=gg(a,b,c,d,bl[i+9],5,568446438);   d=gg(d,a,b,c,bl[i+14],9,-1019803690);
                c=gg(c,d,a,b,bl[i+3],14,-187363961); b=gg(b,c,d,a,bl[i+8],20,1163531501);
                a=gg(a,b,c,d,bl[i+13],5,-1444681467);d=gg(d,a,b,c,bl[i+2],9,-51403784);
                c=gg(c,d,a,b,bl[i+7],14,1735328473); b=gg(b,c,d,a,bl[i+12],20,-1926607734);
                a=hh(a,b,c,d,bl[i+5],4,-378558);     d=hh(d,a,b,c,bl[i+8],11,-2022574463);
                c=hh(c,d,a,b,bl[i+11],16,1839030562);b=hh(b,c,d,a,bl[i+14],23,-35309556);
                a=hh(a,b,c,d,bl[i+1],4,-1530992060); d=hh(d,a,b,c,bl[i+4],11,1272893353);
                c=hh(c,d,a,b,bl[i+7],16,-155497632); b=hh(b,c,d,a,bl[i+10],23,-1094730640);
                a=hh(a,b,c,d,bl[i+13],4,681279174);  d=hh(d,a,b,c,bl[i+0],11,-358537222);
                c=hh(c,d,a,b,bl[i+3],16,-722521979); b=hh(b,c,d,a,bl[i+6],23,76029189);
                a=hh(a,b,c,d,bl[i+9],4,-640364487);  d=hh(d,a,b,c,bl[i+12],11,-421815835);
                c=hh(c,d,a,b,bl[i+15],16,530742520); b=hh(b,c,d,a,bl[i+2],23,-995338651);
                a=ii(a,b,c,d,bl[i+0],6,-198630844);  d=ii(d,a,b,c,bl[i+7],10,1126891415);
                c=ii(c,d,a,b,bl[i+14],15,-1416354905);b=ii(b,c,d,a,bl[i+5],21,-57434055);
                a=ii(a,b,c,d,bl[i+12],6,1700485571); d=ii(d,a,b,c,bl[i+3],10,-1894986606);
                c=ii(c,d,a,b,bl[i+10],15,-1051523);  b=ii(b,c,d,a,bl[i+1],21,-2054922799);
                a=ii(a,b,c,d,bl[i+8],6,1873313359);  d=ii(d,a,b,c,bl[i+15],10,-30611744);
                c=ii(c,d,a,b,bl[i+6],15,-1560198380);b=ii(b,c,d,a,bl[i+13],21,1309151649);
                a=ii(a,b,c,d,bl[i+4],6,-145523070);  d=ii(d,a,b,c,bl[i+11],10,-1120210379);
                c=ii(c,d,a,b,bl[i+2],15,718787259);  b=ii(b,c,d,a,bl[i+9],21,-343485551);
                a=safeAdd(a,aa);b=safeAdd(b,bb);c=safeAdd(c,cc);d=safeAdd(d,dd);
              }
              function hex(n){var s='',v;for(var j=0;j<4;j++){v=(n>>j*8)&255;s+=('0'+v.toString(16)).slice(-2);}return s;}
              return hex(a)+hex(b)+hex(c)+hex(d);
            }
            
            // ---- SHA-256 sur tableau d'octets ------------------------------
            // Implémentation SHA-256 travaillant sur des tableaux d'octets (integers 0-255).
            // Utilisée comme primitive par HMAC-SHA256 et PBKDF2.
            // Retourne un tableau d'octets (32 éléments).
            function sha256b(msg) {
              var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
                     0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
                     0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
                     0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
                     0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
                     0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
                     0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
                     0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
              var H=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
              var l=msg.length; msg=msg.slice(); msg.push(0x80);
              while(msg.length%64!==56) msg.push(0);
              var bl=l*8;
              msg.push(0,0,0,0,(bl>>>24)&0xff,(bl>>>16)&0xff,(bl>>>8)&0xff,bl&0xff);
              function rotr(x,n){return(x>>>n)|(x<<(32-n));}
              function a32(a,b){return(a+b)>>>0;}
              for(var bi=0;bi<msg.length;bi+=64){
                var W=[];
                for(var t=0;t<16;t++) W[t]=((msg[bi+t*4]<<24)|(msg[bi+t*4+1]<<16)|(msg[bi+t*4+2]<<8)|msg[bi+t*4+3])>>>0;
                for(var t=16;t<64;t++){
                  var s0=rotr(W[t-15],7)^rotr(W[t-15],18)^(W[t-15]>>>3);
                  var s1=rotr(W[t-2],17)^rotr(W[t-2],19)^(W[t-2]>>>10);
                  W[t]=a32(a32(a32(W[t-16],s0),W[t-7]),s1);
                }
                var a=H[0],b=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
                for(var t=0;t<64;t++){
                  var S1=rotr(e,6)^rotr(e,11)^rotr(e,25);
                  var ch=(e&f)^(~e&g);
                  var t1=a32(a32(a32(a32(h,S1),ch),K[t]),W[t]);
                  var S0=rotr(a,2)^rotr(a,13)^rotr(a,22);
                  var maj=(a&b)^(a&c)^(b&c);
                  var t2=a32(S0,maj);
                  h=g;g=f;f=e;e=a32(d,t1);d=c;c=b;b=a;a=a32(t1,t2);
                }
                H[0]=a32(H[0],a);H[1]=a32(H[1],b);H[2]=a32(H[2],c);H[3]=a32(H[3],d);
                H[4]=a32(H[4],e);H[5]=a32(H[5],f);H[6]=a32(H[6],g);H[7]=a32(H[7],h);
              }
              var out=[];
              for(var i=0;i<8;i++) out.push((H[i]>>>24)&0xff,(H[i]>>>16)&0xff,(H[i]>>>8)&0xff,H[i]&0xff);
              return out;
            }
            
            // ---- HMAC-SHA-256 (usage générique) ----------------------------
            // Calcule HMAC-SHA256(key, data) — key et data sont des tableaux d'octets.
            // Si la clé dépasse le block size (64 octets), elle est d'abord hachée.
            // Retourne un tableau d'octets (32 éléments).
            function hmacSha256b(key, data) {
              var BS=64;
              if(key.length>BS) key=sha256b(key);
              while(key.length<BS) key.push(0);
              var opad=[],ipad=[];
              for(var i=0;i<BS;i++){opad.push(key[i]^0x5c);ipad.push(key[i]^0x36);}
              return sha256b(opad.concat(sha256b(ipad.concat(data))));
            }
            
            // ---- PBKDF2-HMAC-SHA-256 (optimisé) ----------------------------
            // Dérive une clé cryptographique à partir d'un mot de passe selon RFC 2898.
            // Paramètres :
            //   pwd    : tableau d'octets (mot de passe pré-haché en MD5)
            //   salt   : tableau d'octets (sel fourni par le serveur UrBackup)
            //   iter   : nombre d'itérations (pbkdf2_rounds, typiquement 10000)
            //   dkLen  : longueur de la clé dérivée souhaitée en octets (32 pour SHA-256)
            // Optimisation : ipad/opad calculés une seule fois hors boucle (×2 sur les XOR de clé).
            function pbkdf2b(pwd, salt, iter, dkLen) {
              var BS=64;
              var key=pwd.slice();
              if(key.length>BS) key=sha256b(key);
              while(key.length<BS) key.push(0);
              var opad=new Array(BS), ipad=new Array(BS);
              for(var p=0;p<BS;p++){opad[p]=key[p]^0x5c; ipad[p]=key[p]^0x36;}
              // HMAC interne réutilisant les pads pré-calculés pour éviter de recalculer les XOR
              function H(data){return sha256b(opad.concat(sha256b(ipad.concat(data))));}
              var out=[],blk=1;
              while(out.length<dkLen){
                // Compteur de bloc encodé sur 4 octets big-endian (requis par RFC 2898)
                var blkB=[(blk>>>24)&0xff,(blk>>>16)&0xff,(blk>>>8)&0xff,blk&0xff];
                var U=H(salt.concat(blkB)); // premier bloc U1 = HMAC(pwd, salt || INT(blk))
                var T=U.slice();
                // Itérations suivantes : T[j] = U1 XOR U2 XOR ... XOR Ui
                for(var i=1;i<iter;i++){U=H(U);for(var j=0;j<32;j++)T[j]^=U[j];}
                out=out.concat(T); blk++;
              }
              return out.slice(0,dkLen);
            }
            
            // ---- Helpers de conversion -------------------------------------
            // strToBytes  : convertit une chaîne JS en tableau d'octets (Latin-1 / ASCII)
            // hexToBytes  : convertit une chaîne hexadécimale en tableau d'octets
            // bytesToHex  : convertit un tableau d'octets en chaîne hexadécimale minuscule
            // encodeBody  : sérialise un objet en chaîne application/x-www-form-urlencoded
            function strToBytes(s){var b=[];for(var i=0;i<s.length;i++)b.push(s.charCodeAt(i)&0xff);return b;}
            function hexToBytes(h){var b=[];for(var i=0;i<h.length;i+=2)b.push(parseInt(h.substr(i,2),16));return b;}
            function bytesToHex(b){var h='';for(var i=0;i<b.length;i++)h+=('0'+(b[i]&0xff).toString(16)).slice(-2);return h;}
            function encodeBody(obj){return Object.keys(obj).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(obj[k]);}).join('&');}
            
            // ---- Helpers de formatage pour les listes d'échecs -----------
            // formatDate : convertit un timestamp UNIX (secondes) en "YYYY-MM-DD HH:MM"
            // formatAge  : convertit un nombre de secondes en "Xj Yh" ou "Zh Wmin" lisible
            // Utilisés pour construire les listes de serveurs en échec incluses dans _summary.
            function formatDate(unixSec) {
              var d = new Date(unixSec * 1000);
              return d.getFullYear() + '-' +
                     ('0'+(d.getMonth()+1)).slice(-2) + '-' +
                     ('0'+d.getDate()).slice(-2) + ' ' +
                     ('0'+d.getHours()).slice(-2) + ':' +
                     ('0'+d.getMinutes()).slice(-2);
            }
            function formatAge(secs) {
              var d = Math.floor(secs / 86400);
              var h = Math.floor((secs % 86400) / 3600);
              var m = Math.floor((secs % 3600) / 60);
              if (d > 0) return d + 'j ' + h + 'h';
              if (h > 0) return h + 'h ' + m + 'min';
              return m + 'min';
            }
            
            // ---- Configuration (macros Zabbix substituées à l'exécution) --
            // Les macros {$...} sont remplacées par leurs valeurs avant que le JS s'exécute.
            var SERVER   = '{$URBACKUP_SERVER}';
            var PORT     = '{$URBACKUP_PORT}';
            var USERNAME = '{$URBACKUP_USER}';
            var PASSWORD = '{$URBACKUP_PASS}';
            var BASE     = 'http://' + SERVER + ':' + PORT + '/x';
            
            try {
              // Un seul objet HttpRequest pour toute la session.
              // Content-Type positionné globalement car tous les appels sont en POST form-urlencoded.
              var req = new HttpRequest();
              req.addHeader('User-Agent: Zabbix-UrBackup/2.0');
              req.addHeader('Content-Type: application/x-www-form-urlencoded');
            
              // ---- Étape 1 : obtention du challenge (salt + session) -------
              // POST /x?a=salt avec le nom d'utilisateur dans le body.
              // Retourne : { ses, salt, rnd, pbkdf2_rounds }
              //   ses          : identifiant de session temporaire (cookie-like)
              //   salt         : sel pour le hash du mot de passe
              //   rnd          : nonce pour le hash final (anti-replay)
              //   pbkdf2_rounds: 0 = serveur legacy (MD5 seul), >0 = PBKDF2-HMAC-SHA256
              var r1Raw = req.post(BASE + '?a=salt', 'username=' + encodeURIComponent(USERNAME));
              var r1;
              try { r1 = JSON.parse(r1Raw); }
              catch(e) { throw 'Challenge parse error: ' + String(r1Raw).substring(0, 80); }
            
              var ses          = r1.ses            || '';
              var salt         = r1.salt           || '';
              var rnd          = r1.rnd            || '';
              var pbkdf2Rounds = r1.pbkdf2_rounds  || 0;
            
              if (!ses) throw 'No ses in challenge — réponse: ' + r1Raw.substring(0, 120);
              if (!rnd) throw 'No rnd in challenge';
            
              // ---- Étape 2 : calcul du hash d'authentification ------------
              // Schéma commun aux deux modes :
              //   md5Hex = MD5(salt + password)    ← hash intermédiaire commun
              //
              // Mode PBKDF2 (pbkdf2_rounds > 0, serveurs récents UrBackup 2.4+) :
              //   derivedKey = PBKDF2-HMAC-SHA256(key=md5Hex_bytes, salt=salt_bytes, rounds, 32)
              //   finalHash  = derivedKey_hex
              //
              // Mode legacy (pbkdf2_rounds = 0, anciens serveurs) :
              //   finalHash  = md5Hex
              //
              // Dans les deux cas : pwHash = MD5(rnd + finalHash)
              // C'est la valeur envoyée comme "password" lors du login.
              var md5Hex = md5(salt + PASSWORD);
              var finalHash;
              if (pbkdf2Rounds > 0) {
                // Mode PBKDF2 : dérivation de clé depuis le hash MD5 du mot de passe
                finalHash = bytesToHex(pbkdf2b(hexToBytes(md5Hex), strToBytes(salt), pbkdf2Rounds, 32));
              } else {
                // Mode legacy : pas de dérivation PBKDF2
                finalHash = md5Hex;
              }
              var pwHash = md5(rnd + finalHash);
            
              // ---- Étape 3 : login ----------------------------------------
              // POST /x?a=login avec ses + credentials dans le body (pas en query string).
              // Note : passer ses= en query string (?a=login&ses=X) renvoie {"error":1}
              // depuis UrBackup 2.4.x — le body POST est obligatoire.
              var r2Raw = req.post(BASE + '?a=login',
                'ses='      + encodeURIComponent(ses) +
                '&username=' + encodeURIComponent(USERNAME) +
                '&password=' + encodeURIComponent(pwHash));
              var r2;
              try { r2 = JSON.parse(r2Raw); }
              catch(e) { throw 'Login parse error: ' + r2Raw.substring(0, 80); }
              if (!r2.success) throw 'Auth failed (HTTP ' + req.getStatus() + ') — vérifier {$URBACKUP_USER}/{$URBACKUP_PASS}';
            
              // ---- Étape 4 : collecte des données -------------------------
              // Tous les appels passent ses= dans le body POST (même raison qu'à l'étape 3).
              // Quatre endpoints collectés en une seule exécution :
              //   status   : liste des clients avec statut en ligne, dernier backup, OS...
              //   usage    : utilisation disque par client (fichiers + images)
              //   lastacts : historique des dernières activités (durée, taille, erreurs, warnings)
              //   progress : backups actuellement en cours d'exécution
              var sesBody = 'ses=' + encodeURIComponent(ses);
              var status   = JSON.parse(req.post(BASE + '?a=status',   sesBody));
              var usage    = JSON.parse(req.post(BASE + '?a=usage',    sesBody));
              var lastacts = JSON.parse(req.post(BASE + '?a=lastacts', sesBody));
              var progress = JSON.parse(req.post(BASE + '?a=progress', sesBody));
              if (status.error)   throw 'status API error (HTTP ' + req.getStatus() + ') — ses=' + ses;
              if (usage.error)    throw 'usage API error — ses=' + ses;
            
              // ---- Étape 5 : enrichissement des données clients -----------
              var ts       = Math.floor(Date.now() / 1000); // timestamp UNIX courant (secondes)
              var clients  = status.status    || [];        // liste des clients (renommé en 2.4)
              var actsList = lastacts.lastacts || [];
              var progList = progress.progress || [];
            
              // Index des dernières activités par nom de client (evite O(n²) dans la boucle)
              var actsByName = {}, progByName = {};
              for (var i = 0; i < actsList.length; i++) {
                var act = actsList[i];
                if (act.name && !actsByName[act.name]) actsByName[act.name] = act;
              }
              // Index des backups en cours par nom de client.
              // Stocke le pourcentage de progression (pc) et la vitesse pour détection de blocage.
              // pc est utilisé par l'item backup_pc pour les triggers "sauvegarde bloquée".
              for (var j = 0; j < progList.length; j++) {
                var p = progList[j];
                if (p.name) progByName[p.name] = {
                  pc:         typeof p.pc         === 'number' ? p.pc         : 0,
                  eta_ms:     typeof p.eta_ms      === 'number' ? p.eta_ms     : 0,
                  speed_bpms: typeof p.speed_bpms  === 'number' ? p.speed_bpms : 0
                };
              }
            
              // Compteurs globaux pour le _summary + listes textuelles pour les descriptions de triggers
              // Les échecs fichiers serveurs sont séparés selon l'état online :
              //   cSrvFileFail        : serveurs EN LIGNE en échec  → trigger HIGH (ticket GLPI)
              //   cSrvFileFailOffline : serveurs HORS LIGNE en échec → trigger AVERAGE (sévérité abaissée)
              // Un serveur éteint ne peut pas être sauvegardé : l'échec est attendu, donc moins critique.
              var cTotal=0, cOnline=0, cSrvFileFail=0, cSrvFileFailOffline=0, cWksFileFail=0, cImgFail=0;
              var srvFailList=[], srvFailOfflineList=[], wksFailList=[], imgFailList=[];
            
              for (var k = 0; k < clients.length; k++) {
                var c  = clients[k];
                var nm = c.name || '';
                var lf = c.lastbackup       || 0; // timestamp UNIX du dernier backup fichier
                var li = c.lastbackup_image || 0; // timestamp UNIX du dernier backup image
            
                // Calcul de l'âge des backups en secondes depuis maintenant.
                // -1 indique "jamais sauvegardé" (timestamp = 0).
                c.last_backup_age_s = lf > 0 ? ts - lf : -1;
                c.last_image_age_s  = li > 0 ? ts - li : -1;
            
                // Indique si un backup est actuellement en cours, et son pourcentage de progression.
                // backup_pc = -1 si aucun backup en cours (valeur sentinelle pour les triggers).
                // backup_pc = 0..100 si backup actif (issu de /x?a=progress).
                var prog            = progByName[nm] || null;
                c.backup_running    = prog ? 1 : 0;
                c.backup_pc         = prog ? prog.pc : -1;
            
                // Récupération des métriques de la dernière activité depuis l'index
                var a = actsByName[nm] || {};
                c.last_status     = a.status    !== undefined ? a.status : -1; // -1=inconnu
                c.last_errors     = a.errors    || 0;
                c.last_warnings   = a.warnings  || 0;
                c.last_duration_s = a.duration  || 0;   // durée en secondes
                c.last_size_bytes = a.size_bytes || 0;  // données transférées en octets
            
                // ---- Détection du type de machine (serveur vs poste de travail) ----
                // os_simple retourne "windows" ou "linux" sans distinguer Server/Workstation.
                // os_version_string retourne la chaîne complète, ex: "Microsoft Windows Server 2019 Datacenter"
                // On utilise donc os_version_string pour détecter les Windows Server.
                var osSimple  = (c.os_simple         || '').toLowerCase();
                var osVersion = (c.os_version_string || '').toLowerCase();
                var isLinux   = osSimple  === 'linux' || osVersion.indexOf('linux')  >= 0;
                var isWinSrv  = osVersion.indexOf('server') >= 0;
                // is_server = 1 pour serveurs Windows (toutes éditions) et toutes distributions Linux
                // is_server = 0 pour postes de travail Windows (10/11 Pro/Home/Professionnel)
                c.is_server   = (isLinux || isWinSrv) ? 1 : 0;
            
                // Compteurs globaux — tous les clients confondus
                cTotal++;
                if (c.online) cOnline++;
            
                // Séparation des échecs fichiers selon le type de machine.
                // Un backup est en échec si file_ok=false ET file_disabled=false.
                // file_disabled=true signifie que les backups fichiers sont volontairement désactivés.
                if (!c.file_ok && !c.file_disabled) {
                  var lastFileStr = lf > 0
                    ? formatDate(lf) + ' (il y a ' + formatAge(ts - lf) + ')'
                    : 'jamais sauvegardé';
                  if (c.is_server) {
                    // Serveur en échec : on distingue en ligne (critique) et hors ligne (attendu).
                    if (c.online) {
                      cSrvFileFail++;
                      srvFailList.push('  - ' + nm + ' — dernier backup : ' + lastFileStr);
                    } else {
                      cSrvFileFailOffline++;
                      srvFailOfflineList.push('  - ' + nm + ' (hors ligne) — dernier backup : ' + lastFileStr);
                    }
                  } else {
                    cWksFileFail++;
                    wksFailList.push('  - ' + nm + ' — dernier backup : ' + lastFileStr);
                  }
                }
                // Échecs image : comptabilisés uniquement pour les serveurs/Linux.
                // Les postes de travail ont généralement image_disabled=true.
                if (c.is_server && !c.image_ok && !c.image_disabled) {
                  cImgFail++;
                  var lastImgStr = li > 0
                    ? formatDate(li) + ' (il y a ' + formatAge(ts - li) + ')'
                    : 'jamais sauvegardé';
                  imgFailList.push('  - ' + nm + ' — dernier image : ' + lastImgStr);
                }
              }
            
              // ---- Propagation de is_server vers les entrées usage --------
              // L'endpoint /x?a=usage ne retourne pas os_version_string.
              // On propage is_server depuis status vers usage par correspondance de nom.
              // Utilisé par la règle LLD urbackup.disk.discovery pour filtrer serveurs/Linux.
              var isServerByName = {};
              for (var s = 0; s < clients.length; s++) {
                isServerByName[clients[s].name || ''] = clients[s].is_server || 0;
              }
              var usageList = (usage.usage) || [];
              for (var u = 0; u < usageList.length; u++) {
                var uName = usageList[u].name || '';
                usageList[u].is_server = isServerByName.hasOwnProperty(uName) ? isServerByName[uName] : 0;
              }
            
              // ---- Retour du payload JSON enrichi -------------------------
              // Structure retournée consommée par tous les items DEPENDENT via JSONPath :
              //   _meta    : métadonnées de collecte (timestamp, serveur)
              //   _summary : compteurs globaux extraits par les items globaux
              //   status   : données brutes /x?a=status (avec enrichissements is_server, ages...)
              //   usage    : données brutes /x?a=usage  (avec is_server propagé)
              //   lastacts : données brutes /x?a=lastacts
              //   progress : données brutes /x?a=progress
              return JSON.stringify({
                _meta:    { collected_at: ts, server: SERVER, port: PORT },
                _summary: {
                  clients_total:              cTotal,
                  clients_online:             cOnline,
                  clients_offline:            cTotal - cOnline,
                  backups_running:            progList.length,
                  server_file_failures:               cSrvFileFail,
                  server_file_failures_offline:       cSrvFileFailOffline,
                  workstation_file_failures:          cWksFileFail,
                  image_backup_failures:              cImgFail,
                  server_file_failures_list:          srvFailList.length        > 0 ? srvFailList.join('\n')        : '',
                  server_file_failures_offline_list:  srvFailOfflineList.length > 0 ? srvFailOfflineList.join('\n') : '',
                  workstation_file_failures_list:     wksFailList.length        > 0 ? wksFailList.join('\n')        : '',
                  image_backup_failures_list:         imgFailList.length        > 0 ? imgFailList.join('\n')        : ''
                },
                status:   status,
                usage:    usage,
                lastacts: lastacts,
                progress: progress
              });
            
            } catch(e) {
              throw 'UrBackup collector: ' + e;
            }
          description: |
            Item maître SCRIPT — collecte toutes les données UrBackup en une seule exécution JS.
            
            Flux d'authentification (conforme à l'API UrBackup 2.4+) :
              1. POST /x?a=salt  → challenge : { ses, salt, rnd, pbkdf2_rounds }
              2. Calcul du hash :
                   PBKDF2-HMAC-SHA256(key=MD5(salt+pass), salt, rounds, 32)  ← serveurs récents
                   ou MD5(salt+pass)                                           ← serveurs legacy
                 → pwHash = MD5(rnd + derivedKey)
              3. POST /x?a=login  → { success: true }  (ses + credentials dans le body POST)
              4. POST /x?a=status   → liste clients + statut
                 POST /x?a=usage    → utilisation disque
                 POST /x?a=lastacts → dernières activités
                 POST /x?a=progress → backups en cours
              5. Enrichissement : calcul is_server, âges des backups, index des activités
              6. Retour du payload JSON enrichi
            
            Timeout 60s requis car PBKDF2 (~10 000 itérations) peut prendre jusqu'à 45s en Duktape ES5
            selon les performances du Zabbix Server/Proxy.
            Les items HTTP_AGENT partagent un timeout preprocessing de ~3s, insuffisant.
          timeout: 60s
          tags:
            - tag: application
              value: urbackup
            - tag: component
              value: raw
          triggers:
            - uuid: 13845bd243d6499c97dc426eb2e66966
              expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              name: 'UrBackup: API indisponible sur {HOST.NAME}'
              priority: HIGH
              description: |
                Aucune donnée reçue de l'API UrBackup depuis {$URBACKUP_NO_DATA_TIMEOUT}.
                
                Causes possibles :
                  - Service urbackup-server arrêté sur {HOST.NAME}
                  - Port {$URBACKUP_PORT} inaccessible (pare-feu, réseau)
                  - Credentials incorrects (macros {$URBACKUP_USER} / {$URBACKUP_PASS})
                  - Timeout PBKDF2 dépassé (augmenter le timeout de l'item si nécessaire)
                
                Actions :
                  - Vérifier le service : systemctl status urbackupsrv
                  - Tester l'accès : curl http://{$URBACKUP_SERVER}:{$URBACKUP_PORT}/x?a=salt
                  - Contrôler les macros dans Zabbix (Administration → Hôtes → {HOST.NAME})
                
                Tous les triggers par client dépendent de ce trigger pour éviter les floods d'alertes.
              tags:
                - tag: scope
                  value: availability
        - uuid: aa35f5d358b74c53a920f9466b93e4e3
          name: 'UrBackup: Échecs backup images (global)'
          type: DEPENDENT
          key: urbackup.image.backup.failures
          history: 30d
          trends: 90d
          description: |
            Nombre de serveurs/Linux dont le dernier backup image est en échec.
            Un backup image est considéré en échec si image_ok=false ET image_disabled=false.
            Les postes de travail sont exclus (leur backup image est généralement désactivé).
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.image_backup_failures
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: jobs
          triggers:
            - uuid: 307a86036b814866bf4153e08a8d0cf2
              expression: 'last(/PIC - Urbackup/urbackup.image.backup.failures)>0'
              name: 'UrBackup: {ITEM.LASTVALUE1} client(s) avec backup image en échec'
              priority: AVERAGE
              description: |
                {ITEM.LASTVALUE1} serveur(s)/Linux ont leur dernier backup image en échec.
                
                Le backup image (snapshot disque complet) est critique pour la restauration bare-metal.
                Un échec peut être dû à :
                  - Espace disque insuffisant sur le serveur UrBackup
                  - Client hors ligne au moment du backup planifié
                  - Erreur VSS (Volume Shadow Copy) côté client Windows Server
                  - Droits insuffisants de l'agent UrBackup
                
                Actions :
                  - Identifier les clients en échec dans le dashboard UrBackup
                  - Consulter les logs : /var/log/urbackup/ (serveur) ou Event Viewer (client)
                  - Vérifier l'espace disque disponible sur le serveur UrBackup
              tags:
                - tag: scope
                  value: backup-status
        - uuid: 35897b0cd8a54a8cb7b3cc34149f404f
          name: 'UrBackup: Liste serveurs/Linux avec backup image en échec'
          type: DEPENDENT
          key: urbackup.image.backup.failures.list
          history: 7d
          value_type: TEXT
          description: |
            Liste textuelle des serveurs/Linux dont le dernier backup image est en échec.
            Format : "  - NOM_SERVEUR — dernier image : YYYY-MM-DD HH:MM (il y a Xj Yh)"
            Chaîne vide si aucun échec.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.image_backup_failures_list
              error_handler: CUSTOM_VALUE
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: jobs
        - uuid: 06e9b0da34d64625b7306ce494c9bdea
          name: 'UrBackup: Échecs backup fichiers — serveurs/Linux'
          type: DEPENDENT
          key: urbackup.server.file.failures
          history: 30d
          trends: 90d
          description: |
            Nombre de serveurs Windows et machines Linux dont le dernier backup fichier est en échec.
            Séparé des postes de travail car la criticité est plus élevée pour les serveurs.
            Un backup est en échec si file_ok=false ET file_disabled=false.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.server_file_failures
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: jobs
            - tag: scope
              value: backup-status
          triggers:
            - uuid: 86b5075cec7f4e169bdc782a4fa860c6
              expression: 'last(/PIC - Urbackup/urbackup.server.file.failures)>0'
              name: 'UrBackup: {ITEM.LASTVALUE1} serveur(s)/Linux avec backup fichier en échec'
              priority: HIGH
              description: |
                {ITEM.LASTVALUE1} serveur(s) ou machine(s) Linux EN LIGNE ont leur dernier backup fichier en échec.
                
                Serveurs concernés :
                {{?last(/{HOST.HOST}/urbackup.server.file.failures.list)}}
                
                Priorité HIGH car il s'agit de serveurs de production EN LIGNE — la perte de données serait critique.
                
                Note : seuls les serveurs EN LIGNE sont comptés ici. Si un serveur en échec est éteint
                (hors ligne), il sort de ce compteur et bascule sur le trigger AVERAGE
                "serveur(s)/Linux HORS LIGNE avec backup fichier en échec". Ce trigger HIGH se résout
                alors automatiquement, ce qui ferme le ticket GLPI associé.
                
                Causes fréquentes :
                  - Client hors ligne ou agent UrBackup arrêté
                  - Répertoires sources inaccessibles (permissions, partages réseau déconnectés)
                  - Quota disque dépassé sur le serveur UrBackup
                  - Erreur réseau pendant le transfert
                
                Actions immédiates :
                  - Identifier les serveurs en échec dans l'interface UrBackup
                  - Vérifier que l'agent UrBackup est démarré sur le serveur concerné
                  - Consulter les logs UrBackup pour le détail de l'erreur
                  - Lancer manuellement un backup depuis l'interface UrBackup
              tags:
                - tag: component
                  value: jobs
                - tag: glpi_message
                  value: detailed
                - tag: scope
                  value: backup-status
        - uuid: 61f6e6c69ecf4be097ecf45f9c43182f
          name: 'UrBackup: Liste serveurs/Linux avec backup fichier en échec'
          type: DEPENDENT
          key: urbackup.server.file.failures.list
          history: 7d
          value_type: TEXT
          description: |
            Liste textuelle des serveurs/Linux dont le dernier backup fichier est en échec.
            Format : "  - NOM_SERVEUR — dernier backup : YYYY-MM-DD HH:MM (il y a Xj Yh)"
            Chaîne vide si aucun échec.
            Référencée dans la description du trigger via {{?last(...)}}.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.server_file_failures_list
              error_handler: CUSTOM_VALUE
          master_item:
            key: urbackup.http.master
          tags:
            - tag: component
              value: jobs
        - uuid: ed112ca38f39498d8bb4a53fe4d1bc2f
          name: 'UrBackup: Échecs backup fichiers — serveurs/Linux hors ligne'
          type: DEPENDENT
          key: urbackup.server.file.failures.offline
          history: 30d
          trends: 90d
          description: |
            Nombre de serveurs Windows et machines Linux HORS LIGNE dont le dernier backup fichier est en échec.
            Séparé du compteur principal (serveurs en ligne) car un serveur éteint ne peut pas être
            sauvegardé : l'échec est attendu et la criticité est donc moindre (AVERAGE au lieu de HIGH).
            Un backup est en échec si file_ok=false ET file_disabled=false.
          preprocessing:
            - type: JSONPATH
              parameters:
                - $._summary.server_file_failures_offline
          master_item:
            key: urbackup.http.master
          tags:
