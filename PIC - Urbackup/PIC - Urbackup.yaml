              name: 'UrBackup: {ITEM.LASTVALUE1} poste(s) de travail avec backup fichier en échec'
              priority: AVERAGE
              description: |
                {ITEM.LASTVALUE1} poste(s) de travail Windows ont leur dernier backup fichier en échec.
                
                Causes fréquentes :
                  - Poste éteint ou en veille prolongée au moment du backup planifié
                  - Agent UrBackup arrêté ou non installé
