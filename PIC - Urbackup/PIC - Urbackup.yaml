        - macro: '{$URBACKUP_IMAGE_AGE_WARN}'
          value: '604800'
          description: 'Seuil WARNING âge dernier backup image en secondes (défaut : 7 jours)'
        - macro: '{$URBACKUP_IMAGE_AGE_WARN_LABEL}'
          value: '7 jours'
          description: 'Libellé lisible du seuil WARNING image — affiché dans les noms de triggers'
        - macro: '{$URBACKUP_NO_DATA_TIMEOUT}'
          value: 15m
          description: 'Délai sans données avant déclenchement du trigger API indisponible'
        - macro: '{$URBACKUP_PASS}'
          type: SECRET_TEXT
          description: 'Mot de passe du compte UrBackup — stocké en SECRET_TEXT, jamais visible dans lUI Zabbix'
        - macro: '{$URBACKUP_PORT}'
          value: '55414'
          description: 'Port de lAPI HTTP UrBackup (défaut : 55414)'
        - macro: '{$URBACKUP_SERVER}'
          value: 127.0.0.1
          description: 'IP ou hostname du serveur UrBackup — à surcharger sur lhôte Zabbix'
        - macro: '{$URBACKUP_SERVER_NAMES}'
          value: .^
          description: 'Regex sur le nom client pour forcer lInclusion dans la supervision serveur. Exemple : ^(SERAG|SRVADALGE)$ pour inclure ces deux clients nommément. Défaut .^ = expression qui ne correspond à rien = fonctionnalité inactive. Utile pour les vieux agents qui ne remontent pas os_version_string.'
        - macro: '{$URBACKUP_STUCK_FREEZE}'
          value: 1h
          description: 'Durée pendant laquelle la progression du backup doit être figée pour déclencher les alertes "sauvegarde bloquée" (avec suffixe de temps Zabbix). Défaut : 1h. Augmenter à 2h ou 3h si des backups très lents génèrent des faux positifs.'
        - macro: '{$URBACKUP_STUCK_HIGH_DAYS}'
          value: 5d
          description: 'Durée continue de backup en cours avant alerte HIGH "sauvegarde bloquée" (avec suffixe de temps Zabbix). Combiné avec la progression figée depuis {$URBACKUP_STUCK_FREEZE}. Défaut : 5d. Au-delà, intervention manuelle requise.'
        - macro: '{$URBACKUP_STUCK_WARN_DAYS}'
          value: 3d
          description: 'Durée continue de backup en cours avant alerte AVERAGE "sauvegarde possiblement bloquée" (avec suffixe de temps Zabbix). Combiné avec la progression figée depuis {$URBACKUP_STUCK_FREEZE}. Défaut : 3d. Si le trigger HIGH se déclenche ({$URBACKUP_STUCK_HIGH_DAYS}), intervenir.'
        - macro: '{$URBACKUP_USER}'
          value: zabbix_monitor
          description: 'Compte UrBackup dédié au monitoring — droits lecture seule recommandés'
