        - macro: '{$URBACKUP_BACKUP_AGE_WARN}'
          value: '86400'
          description: 'Seuil WARNING âge dernier backup fichier en secondes (défaut : 24h)'
        - macro: '{$URBACKUP_BACKUP_AGE_WARN_LABEL}'
          value: 24h
          description: 'Libellé lisible du seuil WARNING fichier — affiché dans les noms de triggers'
        - macro: '{$URBACKUP_IMAGE_AGE_HIGH}'
          value: '1209600'
          description: 'Seuil HIGH âge dernier backup image en secondes (défaut : 14 jours)'
        - macro: '{$URBACKUP_IMAGE_AGE_HIGH_LABEL}'
          value: '14 jours'
