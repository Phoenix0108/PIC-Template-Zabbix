      discovery_rules:
        - uuid: 9227bca5c5384043becc8d7727fc024e
          name: 'UrBackup: Découverte des clients'
          type: DEPENDENT
          key: urbackup.clients.discovery
          filter:
            evaltype: OR
            conditions:
              - macro: '{#CLIENT_NAME}'
                value: '{$URBACKUP_SERVER_NAMES}'
              - macro: '{#IS_SERVER}'
                value: ^1$
          lifetime: 3d
          description: |
            Règle LLD découvrant les clients à superviser individuellement.
            
            Filtre (OR) : seuls sont découverts les clients dont :
              - {#IS_SERVER} = 1 : détectés comme serveur Windows ou Linux (via os_version_string)
              - {#CLIENT_NAME} correspond à {$URBACKUP_SERVER_NAMES} : inclusion manuelle par regex
                (fallback pour les vieux clients qui ne remontent pas os_version_string)
            
            Les postes de travail Windows (Win10/11 Pro/Home) sont exclus pour limiter le bruit.
            Macros LLD disponibles : {#CLIENT_NAME}, {#CLIENT_ID}, {#CLIENT_IP},
                                     {#IS_SERVER}, {#OS_SIMPLE}, {#OS_VERSION},
                                     {#FILE_DISABLED}, {#IMAGE_DISABLED}
          item_prototypes:
            - uuid: 689c40430cb24b4c80fd12f6ad60a25f
              name: 'UrBackup: [{#CLIENT_NAME}] Progression backup en cours'
              type: DEPENDENT
              key: 'urbackup.client.backup_pc[{#CLIENT_NAME}]'
              history: 10d
              value_type: FLOAT
              trends: 90d
              units: '%'
              description: |
                Pourcentage de progression du backup actuellement en cours pour {#CLIENT_NAME}.
                -1 = aucun backup en cours (valeur sentinelle — item en veille).
                0..100 = progression du backup actif (issu de /x?a=progress).
                
                Utilisé par les triggers "sauvegarde bloquée" :
                  si min(backup_pc, {$URBACKUP_STUCK_FREEZE}) = max(backup_pc, {$URBACKUP_STUCK_FREEZE})
                  → progression figée pendant {$URBACKUP_STUCK_FREEZE} → alerte déclenchée.

                Pas de preprocessing DISCARD_UNCHANGED : chaque valeur est stockée toutes les 5 min
                pour que le calcul min/max sur {$URBACKUP_STUCK_FREEZE} soit exact.
                La condition "> 0" dans les triggers exclut la valeur sentinelle -1 et les backups
                en phase de démarrage (0% avant transfert effectif).
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].backup_pc.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: jobs
            - uuid: 402ecda38761475893bbe7ed36a1180f
              name: 'UrBackup: [{#CLIENT_NAME}] Erreurs dernier backup'
              type: DEPENDENT
              key: 'urbackup.client.errors[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              description: |
                Nombre d'erreurs enregistrées lors du dernier backup de {#CLIENT_NAME}.
                Une valeur > 0 déclenche un trigger WARNING.
                Les erreurs sont des anomalies non bloquantes : fichiers verrouillés, permissions
                insuffisantes sur certains répertoires, etc.
                Consulter les logs UrBackup du client pour le détail.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].last_errors.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: jobs
              trigger_prototypes:
                - uuid: 4e2b0da914234461bc475682f3a5ef8b
                  expression: 'last(/PIC - Urbackup/urbackup.client.errors[{#CLIENT_NAME}])>0'
                  name: 'UrBackup: [{#CLIENT_NAME}] {ITEM.LASTVALUE1} erreur(s) dans le dernier backup'
                  priority: WARNING
                  description: |
                    Le dernier backup de {#CLIENT_NAME} a généré {ITEM.LASTVALUE1} erreur(s).
                    
                    Les erreurs n'ont pas empêché le backup de se terminer (sinon file_ok=false)
                    mais signalent des fichiers ou répertoires non sauvegardés.
                    
                    Causes fréquentes :
                      - Fichiers verrouillés par une application au moment du backup
                      - Permissions insuffisantes sur certains répertoires
                      - Fichiers supprimés pendant le transfert
                    
                    Actions :
                      - Consulter les logs détaillés dans l'interface UrBackup (client → dernière activité)
                      - Identifier les fichiers concernés et ajuster les exclusions ou permissions
                  dependencies:
                    - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                      expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
                  tags:
                    - tag: client
                      value: '{#CLIENT_NAME}'
                    - tag: scope
                      value: backup-errors
            - uuid: f526f6678979474f9ee9a6810f84b1f4
              name: 'UrBackup: [{#CLIENT_NAME}] Backup fichiers OK'
              type: DEPENDENT
              key: 'urbackup.client.file_ok[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              description: |
                Statut du dernier backup fichier pour {#CLIENT_NAME}.
                1 = dernier backup fichier réussi.
                0 = dernier backup fichier en échec (trigger AVERAGE déclenché).
                Non évalué si file_disabled=true (backups fichiers désactivés pour ce client).
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].file_ok.first()'
                  error_handler: DISCARD_VALUE
                - type: BOOL_TO_DECIMAL
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: backup-status
            - uuid: 31161ddd70a142669b01cbede1b5bdc2
              name: 'UrBackup: [{#CLIENT_NAME}] Backup image OK'
              type: DEPENDENT
              key: 'urbackup.client.image_ok[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              description: |
                Statut du dernier backup image pour {#CLIENT_NAME}.
                1 = dernier backup image réussi.
                0 = dernier backup image en échec (trigger AVERAGE déclenché).
                Non évalué si image_disabled=true (backups image désactivés pour ce client).
                Le backup image est un snapshot complet du disque — critique pour restauration bare-metal.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].image_ok.first()'
                  error_handler: DISCARD_VALUE
                - type: BOOL_TO_DECIMAL
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: backup-status
            - uuid: 338cf41e729f4fa6a039976c1f8ee689
              name: 'UrBackup: [{#CLIENT_NAME}] Âge dernier backup fichier'
              type: DEPENDENT
              key: 'urbackup.client.last_backup_age[{#CLIENT_NAME}]'
              history: 30d
              value_type: FLOAT
              trends: 90d
              units: s
              description: |
                Temps écoulé en secondes depuis le dernier backup fichier réussi de {#CLIENT_NAME}.
                -1 = aucun backup fichier n'a jamais été effectué pour ce client.
                Utilisé par les triggers d'âge (WARNING à {$URBACKUP_BACKUP_AGE_WARN}s, HIGH à {$URBACKUP_BACKUP_AGE_HIGH}s).
                La condition ">0" dans les triggers exclut la valeur sentinelle -1.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].last_backup_age_s.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: backup-age
            - uuid: cdfb6ca11607431395832ac95fd4b825
              name: 'UrBackup: [{#CLIENT_NAME}] Durée dernier backup'
              type: DEPENDENT
              key: 'urbackup.client.last_duration[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              units: s
              description: |
                Durée en secondes du dernier backup (fichiers ou images) de {#CLIENT_NAME}.
                Une augmentation significative et persistante peut indiquer :
                  - Croissance du volume de données à sauvegarder
                  - Dégradation des performances réseau entre le client et le serveur
                  - Charge excessive sur le serveur UrBackup
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].last_duration_s.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: performance
            - uuid: ffc911b75df14a59aa56dd8bb76c07ec
              name: 'UrBackup: [{#CLIENT_NAME}] Âge dernier backup image'
              type: DEPENDENT
              key: 'urbackup.client.last_image_age[{#CLIENT_NAME}]'
              history: 30d
              value_type: FLOAT
              trends: 90d
              units: s
              description: |
                Temps écoulé en secondes depuis le dernier backup image réussi de {#CLIENT_NAME}.
                -1 = aucun backup image n'a jamais été effectué pour ce client.
                Utilisé par les triggers d'âge (WARNING à {$URBACKUP_IMAGE_AGE_WARN}s, HIGH à {$URBACKUP_IMAGE_AGE_HIGH}s).
                La condition ">0" dans les triggers exclut la valeur sentinelle -1.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].last_image_age_s.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: backup-age
            - uuid: 41c8427af15c4e3da1fd3592dfa8e470
              name: 'UrBackup: [{#CLIENT_NAME}] Taille dernier backup'
              type: DEPENDENT
              key: 'urbackup.client.last_size[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              units: B
              description: |
                Volume de données transférées lors du dernier backup de {#CLIENT_NAME} (en octets).
                Inclut les backups fichiers et images.
                Une valeur anormalement faible peut indiquer un backup partiel ou incomplet.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].last_size_bytes.first()'
                  error_handler: DISCARD_VALUE
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: performance
            - uuid: 3626d85ebbe44d97941c9017b4a2928a
              name: 'UrBackup: [{#CLIENT_NAME}] Statut dernier backup'
              type: DEPENDENT
              key: 'urbackup.client.last_status[{#CLIENT_NAME}]'
              history: 30d
              value_type: FLOAT
              trends: 90d
              description: |
                Code de statut du dernier backup de {#CLIENT_NAME} (issu de lastacts).
                  -1 = inconnu (aucune activité enregistrée)
                   0 = aucun backup effectué
                   1 = succès complet
                   2 = succès partiel (certains fichiers non sauvegardés, voir erreurs/warnings)
                   3 = échec (backup interrompu ou non démarré)
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].last_status.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: backup-status
            - uuid: 01c9cf75ee924c89a02a5a7633cbcf42
              name: 'UrBackup: [{#CLIENT_NAME}] En ligne'
              type: DEPENDENT
              key: 'urbackup.client.online[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              description: |
                Disponibilité réseau du client {#CLIENT_NAME} vue depuis le serveur UrBackup.
                1 = client joignable (agent UrBackup connecté au serveur).
                0 = client hors ligne (trigger WARNING déclenché).
                Un client hors ligne ne peut pas effectuer de backup planifié.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].online.first()'
                  error_handler: DISCARD_VALUE
                - type: BOOL_TO_DECIMAL
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: availability
              trigger_prototypes:
                - uuid: 7925992982c34cd49f443c77c44bd437
                  expression: 'last(/PIC - Urbackup/urbackup.client.online[{#CLIENT_NAME}])=0'
                  name: 'UrBackup: Client [{#CLIENT_NAME}] hors ligne ({#CLIENT_IP})'
                  priority: WARNING
                  description: |
                    Le client {#CLIENT_NAME} (IP: {#CLIENT_IP}) est hors ligne.
                    L'agent UrBackup n'est plus connecté au serveur — aucun backup ne peut s'effectuer.
                    
                    Causes possibles :
                      - Machine éteinte ou en veille
                      - Service UrBackup Client arrêté sur le poste
                      - Problème réseau (VLAN, pare-feu, changement d'adresse IP)
                      - Machine renommée ou supprimée (le client obsolète reste listé dans UrBackup)
                    
                    Actions :
                      - Vérifier que la machine est accessible (ping {#CLIENT_IP})
                      - Vérifier le service : services.msc → UrBackup Client (Windows)
                        ou systemctl status urbackupclientbackend (Linux)
                      - Si la machine n'existe plus, supprimer le client dans UrBackup
                  dependencies:
                    - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                      expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
                  tags:
                    - tag: client
                      value: '{#CLIENT_NAME}'
                    - tag: scope
                      value: availability
            - uuid: b9ce4146797742ea96e4163aa2a2e53d
              name: 'UrBackup: [{#CLIENT_NAME}] Backup en cours'
              type: DEPENDENT
              key: 'urbackup.client.running[{#CLIENT_NAME}]'
              history: 7d
              trends: '0'
              description: |
                Indique si un backup est actuellement en cours d'exécution pour {#CLIENT_NAME}.
                1 = backup en cours (fichiers ou image).
                0 = aucun backup actif.
                Utilisé dans les triggers d'âge pour éviter les faux positifs : un backup
                en cours ne déclenche pas d'alerte même si l'âge du dernier backup dépasse le seuil.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].backup_running.first()'
                  error_handler: DISCARD_VALUE
                - type: BOOL_TO_DECIMAL
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: jobs
            - uuid: 1265f5b75eca41d783047ea39c28f150
              name: 'UrBackup: [{#CLIENT_NAME}] Warnings dernier backup'
              type: DEPENDENT
              key: 'urbackup.client.warnings[{#CLIENT_NAME}]'
              history: 30d
              trends: 90d
              description: |
                Nombre d'avertissements enregistrés lors du dernier backup de {#CLIENT_NAME}.
                Les warnings sont moins critiques que les erreurs mais méritent attention.
                Exemples : fichiers modifiés pendant le backup, liens symboliques non suivis.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$.status.status[?(@.name=="{#CLIENT_NAME}")].last_warnings.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: urbackup.http.master
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: component
                  value: jobs
          trigger_prototypes:
            - uuid: 390113ce33c04804831ab3fd2ddfcc7f
              expression: |
                last(/PIC - Urbackup/urbackup.client.last_backup_age[{#CLIENT_NAME}])>{$URBACKUP_BACKUP_AGE_HIGH}
                and last(/PIC - Urbackup/urbackup.client.last_backup_age[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}])=0
                and last(/PIC - Urbackup/urbackup.client.file_ok[{#CLIENT_NAME}])=1
                and last(/PIC - Urbackup/urbackup.client.online[{#CLIENT_NAME}])=1
                and "{#FILE_DISABLED}"<>"true"
              name: 'UrBackup: [{#CLIENT_NAME}] Pas de backup fichier depuis >{$URBACKUP_BACKUP_AGE_HIGH_LABEL}'
              priority: HIGH
              description: |
                Aucun backup fichier depuis plus de {$URBACKUP_BACKUP_AGE_HIGH_LABEL} pour {#CLIENT_NAME} (IP: {#CLIENT_IP}).
                Aucun backup en cours et le client est EN LIGNE — la situation est anormale et critique.
                Si la machine est éteinte/hors ligne, l'alerte bascule en AVERAGE (trigger "(client hors ligne)"),
                ce qui résout cette alerte HIGH et ferme le ticket GLPI associé.
                
                Seuil HIGH = {$URBACKUP_BACKUP_AGE_HIGH} secondes ({$URBACKUP_BACKUP_AGE_HIGH_LABEL}).
                
                Actions urgentes :
                  - Vérifier que le client est en ligne (voir trigger "hors ligne")
                  - Vérifier le service UrBackup Client sur {#CLIENT_NAME}
                  - Consulter les logs UrBackup pour identifier la cause de l'interruption
                  - Lancer manuellement un backup depuis l'interface UrBackup
                  - Vérifier qu'aucune exclusion de planification n'est active sur ce client
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: backup-age
            - uuid: a1f3c0d2e4b54a6789ab01cd23ef4501
              expression: |
                last(/PIC - Urbackup/urbackup.client.last_backup_age[{#CLIENT_NAME}])>{$URBACKUP_BACKUP_AGE_HIGH}
                and last(/PIC - Urbackup/urbackup.client.last_backup_age[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}])=0
                and last(/PIC - Urbackup/urbackup.client.file_ok[{#CLIENT_NAME}])=1
                and last(/PIC - Urbackup/urbackup.client.online[{#CLIENT_NAME}])=0
                and "{#FILE_DISABLED}"<>"true"
              name: 'UrBackup: [{#CLIENT_NAME}] Pas de backup fichier depuis >{$URBACKUP_BACKUP_AGE_HIGH_LABEL} (client hors ligne)'
              priority: AVERAGE
              description: |
                Aucun backup fichier depuis plus de {$URBACKUP_BACKUP_AGE_HIGH_LABEL} pour {#CLIENT_NAME} (IP: {#CLIENT_IP}),
                ET le client est actuellement HORS LIGNE (machine éteinte ou injoignable).
                
                Sévérité abaissée à AVERAGE (vs HIGH lorsque le client est en ligne) :
                une machine éteinte ne peut pas être sauvegardée, la situation est donc attendue
                tant qu'elle reste hors ligne.
                
                Basculement HIGH → AVERAGE : lorsque le serveur passe hors ligne, le trigger HIGH
                "Pas de backup fichier depuis >{$URBACKUP_BACKUP_AGE_HIGH_LABEL}" se résout
                (condition online=1 devenue fausse), ce qui ferme le ticket GLPI HIGH associé.
                Ce trigger AVERAGE prend alors le relais (online=0) en moindre priorité.
                
                Actions :
                  - Confirmer que l'arrêt du client est volontaire (maintenance, mise hors service)
                  - Si la machine doit rester en service : la rallumer pour reprendre les backups
                  - Si la machine est décommissionnée : supprimer le client dans UrBackup
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: backup-age
            - uuid: b49727d835bb4bb0888edc402809a61d
              expression: |
                last(/PIC - Urbackup/urbackup.client.last_backup_age[{#CLIENT_NAME}])>{$URBACKUP_BACKUP_AGE_WARN}
                and last(/PIC - Urbackup/urbackup.client.last_backup_age[{#CLIENT_NAME}])<{$URBACKUP_BACKUP_AGE_HIGH}
                and last(/PIC - Urbackup/urbackup.client.last_backup_age[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}])=0
                and last(/PIC - Urbackup/urbackup.client.file_ok[{#CLIENT_NAME}])=1
                and "{#FILE_DISABLED}"<>"true"
              name: 'UrBackup: [{#CLIENT_NAME}] Pas de backup fichier depuis >{$URBACKUP_BACKUP_AGE_WARN_LABEL}'
              priority: WARNING
              description: |
                Aucun backup fichier depuis plus de {$URBACKUP_BACKUP_AGE_WARN_LABEL} pour {#CLIENT_NAME} (IP: {#CLIENT_IP}).
                Aucun backup en cours — le client n'a pas été sauvegardé dans les délais normaux.
                
                Seuil WARNING = {$URBACKUP_BACKUP_AGE_WARN} secondes ({$URBACKUP_BACKUP_AGE_WARN_LABEL}).
                Si la situation persiste, le trigger HIGH se déclenchera à {$URBACKUP_BACKUP_AGE_HIGH_LABEL}.
                
                Actions :
                  - Vérifier que le client est en ligne
                  - Contrôler la planification des backups dans UrBackup
                  - Vérifier les logs pour un éventuel échec silencieux
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: backup-age
            - uuid: 61ee7c657b60479d8793c56989fd7901
              expression: |
                last(/PIC - Urbackup/urbackup.client.last_image_age[{#CLIENT_NAME}])>{$URBACKUP_IMAGE_AGE_HIGH}
                and last(/PIC - Urbackup/urbackup.client.last_image_age[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}])=0
                and last(/PIC - Urbackup/urbackup.client.image_ok[{#CLIENT_NAME}])=1
                and last(/PIC - Urbackup/urbackup.client.online[{#CLIENT_NAME}])=1
                and "{#IMAGE_DISABLED}"<>"true"
              name: 'UrBackup: [{#CLIENT_NAME}] Pas de backup image depuis >{$URBACKUP_IMAGE_AGE_HIGH_LABEL}'
              priority: HIGH
              description: |
                Aucun backup image depuis plus de {$URBACKUP_IMAGE_AGE_HIGH_LABEL} pour {#CLIENT_NAME} (IP: {#CLIENT_IP}).
                Le client est EN LIGNE. Si la machine est éteinte/hors ligne, l'alerte bascule en AVERAGE
                (trigger "(client hors ligne)"), ce qui résout cette alerte HIGH et ferme le ticket GLPI associé.
                
                Seuil HIGH = {$URBACKUP_IMAGE_AGE_HIGH} secondes ({$URBACKUP_IMAGE_AGE_HIGH_LABEL}).
                
                Le backup image est le seul moyen de restaurer le système complet en cas de panne matérielle.
                Sans backup image récent, une restauration bare-metal est impossible.
                
                Actions urgentes :
                  - Vérifier l'état du client et de l'agent UrBackup
                  - Consulter les logs VSS si client Windows Server
                  - Vérifier l'espace disque sur le serveur UrBackup
                  - Forcer un backup image depuis l'interface UrBackup
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: backup-age
            - uuid: b2e4d1c3f5a64b7890bc12de34af5602
              expression: |
                last(/PIC - Urbackup/urbackup.client.last_image_age[{#CLIENT_NAME}])>{$URBACKUP_IMAGE_AGE_HIGH}
                and last(/PIC - Urbackup/urbackup.client.last_image_age[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}])=0
                and last(/PIC - Urbackup/urbackup.client.image_ok[{#CLIENT_NAME}])=1
                and last(/PIC - Urbackup/urbackup.client.online[{#CLIENT_NAME}])=0
                and "{#IMAGE_DISABLED}"<>"true"
              name: 'UrBackup: [{#CLIENT_NAME}] Pas de backup image depuis >{$URBACKUP_IMAGE_AGE_HIGH_LABEL} (client hors ligne)'
              priority: AVERAGE
              description: |
                Aucun backup image depuis plus de {$URBACKUP_IMAGE_AGE_HIGH_LABEL} pour {#CLIENT_NAME} (IP: {#CLIENT_IP}),
                ET le client est actuellement HORS LIGNE (machine éteinte ou injoignable).
                
                Sévérité abaissée à AVERAGE (vs HIGH lorsque le client est en ligne) :
                une machine éteinte ne peut pas être sauvegardée, la situation est donc attendue
                tant qu'elle reste hors ligne.
                
                Basculement HIGH → AVERAGE : lorsque le serveur passe hors ligne, le trigger HIGH
                "Pas de backup image depuis >{$URBACKUP_IMAGE_AGE_HIGH_LABEL}" se résout
                (condition online=1 devenue fausse), ce qui ferme le ticket GLPI HIGH associé.
                Ce trigger AVERAGE prend alors le relais (online=0) en moindre priorité.
                
                Actions :
                  - Confirmer que l'arrêt du client est volontaire (maintenance, mise hors service)
                  - Si la machine doit rester en service : la rallumer pour reprendre les backups
                  - Si la machine est décommissionnée : supprimer le client dans UrBackup
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: backup-age
            - uuid: fbdd8026f96a4e31a3eaea7d0538c5ec
              expression: |
                last(/PIC - Urbackup/urbackup.client.last_image_age[{#CLIENT_NAME}])>{$URBACKUP_IMAGE_AGE_WARN}
                and last(/PIC - Urbackup/urbackup.client.last_image_age[{#CLIENT_NAME}])<{$URBACKUP_IMAGE_AGE_HIGH}
                and last(/PIC - Urbackup/urbackup.client.last_image_age[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}])=0
                and last(/PIC - Urbackup/urbackup.client.image_ok[{#CLIENT_NAME}])=1
                and "{#IMAGE_DISABLED}"<>"true"
              name: 'UrBackup: [{#CLIENT_NAME}] Pas de backup image depuis >{$URBACKUP_IMAGE_AGE_WARN_LABEL}'
              priority: WARNING
              description: |
                Aucun backup image depuis plus de {$URBACKUP_IMAGE_AGE_WARN_LABEL} pour {#CLIENT_NAME} (IP: {#CLIENT_IP}).
                
                Seuil WARNING = {$URBACKUP_IMAGE_AGE_WARN} secondes ({$URBACKUP_IMAGE_AGE_WARN_LABEL}).
                Si la situation persiste, le trigger HIGH se déclenchera à {$URBACKUP_IMAGE_AGE_HIGH_LABEL}.
                
                Actions :
                  - Vérifier la planification du backup image dans UrBackup
                  - Contrôler les logs pour un éventuel échec du backup image précédent
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: backup-age
            - uuid: 036244573dee4e5282ebe03b980099b7
              expression: |
                min(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}],{$URBACKUP_STUCK_HIGH_DAYS})=1
                and min(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}],{$URBACKUP_STUCK_FREEZE})=max(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}],{$URBACKUP_STUCK_FREEZE})
                and last(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}])<100
              name: 'UrBackup: [{#CLIENT_NAME}] Sauvegarde bloquée depuis +{$URBACKUP_STUCK_HIGH_DAYS} — intervenir'
              priority: HIGH
              description: |
                Le backup de {#CLIENT_NAME} (IP: {#CLIENT_IP}) est en cours depuis plus de {$URBACKUP_STUCK_HIGH_DAYS}
                et la progression (backup_pc) n'a pas bougé depuis {$URBACKUP_STUCK_FREEZE}.
                
                Situation critique : un backup bloqué aussi longtemps mobilise des ressources
                (réseau, disque, verrous fichiers) et masque un vrai problème de sauvegarde.
                
                Actions urgentes :
                  - Ouvrir l'interface UrBackup → Activités → vérifier la vitesse (speed_bpms)
                  - Si vitesse = 0 B/s depuis > 1h : le backup est mort — interrompre via UrBackup
                  - Vérifier la connectivité réseau avec {#CLIENT_NAME} (ping {#CLIENT_IP})
                  - Contrôler les verrous fichiers sur le client (handle.exe / lsof)
                  - Après interruption : lancer manuellement un nouveau backup depuis UrBackup
                  - Consulter les logs UrBackup (/var/log/urbackup/ ou interface → Logs) pour la cause
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: stuck-backup
            - uuid: 6f3ce6c80607438da2f6ba60c8806b95
              expression: |
                min(/PIC - Urbackup/urbackup.client.running[{#CLIENT_NAME}],{$URBACKUP_STUCK_WARN_DAYS})=1
                and min(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}],{$URBACKUP_STUCK_FREEZE})=max(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}],{$URBACKUP_STUCK_FREEZE})
                and last(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}])>0
                and last(/PIC - Urbackup/urbackup.client.backup_pc[{#CLIENT_NAME}])<100
              name: 'UrBackup: [{#CLIENT_NAME}] Sauvegarde possiblement bloquée depuis +{$URBACKUP_STUCK_WARN_DAYS}'
              priority: AVERAGE
              description: |
                Le backup de {#CLIENT_NAME} (IP: {#CLIENT_IP}) est en cours depuis plus de {$URBACKUP_STUCK_WARN_DAYS}
                et la progression n'a pas changé depuis {$URBACKUP_STUCK_FREEZE}.
                
                Un premier backup full ou un gros volume peut légitimement durer plusieurs jours.
                Cependant, une progression figée pendant 1h est anormale.
                
                Actions :
                  - Vérifier l'interface UrBackup → backup en cours → vitesse de transfert
                  - Si vitesse nulle : problème réseau ou fichier bloquant le transfert
                  - Si vitesse faible mais positive : backup lent, surveiller avant d'intervenir
                  - Si aucune progression dans les prochaines heures → trigger HIGH se déclenche à {$URBACKUP_STUCK_HIGH_DAYS}
              dependencies:
                - name: 'UrBackup: API indisponible sur {HOST.NAME}'
                  expression: 'nodata(/PIC - Urbackup/urbackup.http.master,{$URBACKUP_NO_DATA_TIMEOUT})=1'
              tags:
                - tag: client
                  value: '{#CLIENT_NAME}'
                - tag: scope
                  value: stuck-backup
          graph_prototypes:
            - uuid: 5d62b836c96741fba69efdb5d93fb231
              name: 'UrBackup: [{#CLIENT_NAME}] Performance'
              graph_items:
                - color: 1A7C11
                  item:
                    host: 'PIC - Urbackup'
                    key: 'urbackup.client.last_duration[{#CLIENT_NAME}]'
                - sortorder: '1'
                  color: 2774A4
                  yaxisside: RIGHT
