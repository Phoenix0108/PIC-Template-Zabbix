                    - name: 'Linux: FS [{#FSNAME}]: Space is critically low'
                      expression: 'min(/PIC Linux by Zabbix agent/vfs.fs.dependent.size[{#FSNAME},pused],6h)>{$VFS.FS.PUSED.MAX.CRIT:"{#FSNAME}"}'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: capacity
