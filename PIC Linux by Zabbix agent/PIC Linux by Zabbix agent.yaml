  triggers:
    - uuid: b1c2d3e4f5a64789b234567890abcde0
      expression: 'nodata(/PIC Linux by Zabbix agent/vfs.fs.get,10m)=1 and nodata(/PIC Linux by Zabbix agent/agent.ping,5m)=0'
      name: 'Linux: collecte des FS gelée — vfs.fs.get muet (I/O hang probable)'
      event_name: 'Linux: collecte des FS gelée — vfs.fs.get muet (agent vivant, I/O hang probable)'
      priority: HIGH
      description: |
        Le master item vfs.fs.get ne renvoie plus de données depuis 10 minutes, mais l'agent Zabbix répond toujours (agent.ping reçu dans les 5 dernières minutes).
        Diagnostic probable : gel I/O — un statfs() est suspendu indéfiniment sur un montage bloqué (ex. thread ZFS txg_sync en état D).
        Ce trigger est parent (via dépendances) de tous les triggers "FS has disappeared" de cet hôte : ceux-ci sont supprimés tant que ce trigger est actif, évitant les faux positifs multiples vers GLPI.
        Action : investiguer la couche stockage sous-jacente (état ZFS, logs dmesg, couche bloc/hyperviseur).
      tags:
        - tag: failure_mode
          value: io_hang
        - tag: scope
          value: availability
    - uuid: 451aee4ae36c4c2383ba8a03de212ca6
      expression: 'last(/PIC Linux by Zabbix agent/proc.num)/last(/PIC Linux by Zabbix agent/kernel.maxproc)*100>80'
      name: 'Linux: Getting closer to process limit'
      event_name: 'Linux: Getting closer to process limit (over 80% used)'
      opdata: '{ITEM.LASTVALUE1} active, {ITEM.LASTVALUE2} limit.'
      status: DISABLED
      priority: WARNING
      tags:
        - tag: scope
          value: performance
    - uuid: d9a2cf49833741079a78605033946849
      expression: 'max(/PIC Linux by Zabbix agent/system.swap.size[,pfree],2h)<{$SWAP.PFREE.MIN.WARN} and last(/PIC Linux by Zabbix agent/system.swap.size[,total])>0'
      name: 'Linux: High swap space usage'
      event_name: 'Linux: High swap space usage (less than {$SWAP.PFREE.MIN.WARN}% free)'
      opdata: 'Free: {ITEM.LASTVALUE1}, total: {ITEM.LASTVALUE2}'
      status: DISABLED
      priority: WARNING
      description: 'If there is no swap configured, this trigger is ignored.'
      dependencies:
        - name: 'Linux: High memory utilization'
          expression: 'min(/PIC Linux by Zabbix agent/vm.memory.utilization,1h)>{$MEMORY.UTIL.MAX}'
        - name: 'Linux: Lack of available memory'
          expression: 'max(/PIC Linux by Zabbix agent/vm.memory.size[available],5m)<{$MEMORY.AVAILABLE.MIN} and last(/PIC Linux by Zabbix agent/vm.memory.size[total])>0'
      tags:
        - tag: scope
          value: capacity
    - uuid: e6193d4fc0e14c95b1dce158318999bf
      expression: 'max(/PIC Linux by Zabbix agent/vm.memory.size[available],5m)<{$MEMORY.AVAILABLE.MIN} and last(/PIC Linux by Zabbix agent/vm.memory.size[total])>0'
      name: 'Linux: Lack of available memory'
      event_name: 'Linux: Lack of available memory (<{$MEMORY.AVAILABLE.MIN} of {ITEM.VALUE2})'
      opdata: 'Available: {ITEM.LASTVALUE1}, total: {ITEM.LASTVALUE2}'
      status: DISABLED
      priority: AVERAGE
      description: 'The system is running out of memory.'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance
    - uuid: a3d56558620649bdb375833d92d84b6c
      expression: |
        min(/PIC Linux by Zabbix agent/system.cpu.load[all,avg1],2h)/last(/PIC Linux by Zabbix agent/system.cpu.num)>{$LOAD_AVG_PER_CPU.MAX.WARN}
        and last(/PIC Linux by Zabbix agent/system.cpu.load[all,avg5])>0
        and last(/PIC Linux by Zabbix agent/system.cpu.load[all,avg15])>0
      name: 'Linux: Load average is too high'
      event_name: 'Linux: Load average is too high (per CPU load over {$LOAD_AVG_PER_CPU.MAX.WARN} for 2h)'
      opdata: 'Load averages(1m 5m 15m): ({ITEM.LASTVALUE1} {ITEM.LASTVALUE3} {ITEM.LASTVALUE4}), # of CPUs: {ITEM.LASTVALUE2}'
      status: DISABLED
      priority: AVERAGE
      description: 'The load average per CPU is too high. The system may be slow to respond.'
      tags:
        - tag: scope
          value: capacity
        - tag: scope
          value: performance
