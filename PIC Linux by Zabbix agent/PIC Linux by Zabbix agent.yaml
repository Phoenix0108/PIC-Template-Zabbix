              trigger_prototypes:
                - uuid: 00a93e77c3c941e69df3039648496175
                  expression: 'last(/PIC Linux by Zabbix agent/vfs.fs.dependent[{#FSNAME},readonly],#2)=0 and last(/PIC Linux by Zabbix agent/vfs.fs.dependent[{#FSNAME},readonly])=1'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'last(/PIC Linux by Zabbix agent/vfs.fs.dependent[{#FSNAME},readonly])=0'
                  name: 'Linux: FS [{#FSNAME}]: Filesystem has become read-only'
                  status: DISABLED
                  priority: AVERAGE
                  description: 'The filesystem has become read-only, possibly due to an I/O error. Available only for Zabbix agents 6.4 and higher.'
                  manual_close: 'YES'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
          trigger_prototypes:
            - uuid: a7b8c9d0e1f2435689c8d9e0f1a2b3c4
              expression: 'nodata(/PIC Linux by Zabbix agent/vfs.fs.dependent[{#FSNAME},data],10m)=1 and nodata(/PIC Linux by Zabbix agent/agent.ping,10m)=0'
              name: 'Linux: FS [{#FSNAME}]: Filesystem has disappeared'
              event_name: 'Linux: FS [{#FSNAME}]: Filesystem has disappeared (no data for 10m)'
              priority: DISASTER
              description: |
                Le systeme de fichiers {#FSNAME} ne remonte plus de donnees ALORS QUE l'agent
                repond toujours (agent.ping vivant) : demontage ou disque sous-jacent disparu.
                La garde `and nodata(agent.ping,10m)=0` empeche le faux positif quand c'est
                l'hote ou le proxy de collecte qui est muet (toutes les metriques se taisent
                en meme temps) : dans ce cas l'alerte pertinente est `agent is not available`
                (hote/agent HS, proxy up) ou le trigger proxy-down cote serveur (proxy HS).
              manual_close: 'YES'
              dependencies:
                - name: 'Linux: collecte des FS gelée — vfs.fs.get muet (I/O hang probable)'
                  expression: 'nodata(/PIC Linux by Zabbix agent/vfs.fs.get,10m)=1 and nodata(/PIC Linux by Zabbix agent/agent.ping,5m)=0'
              tags:
                - tag: scope
                  value: availability
