              name: 'OSPF neighbor [{#SNMPVALUE}]: Events'
              type: DEPENDENT
              key: 'aruba.ospf.neighbor.events[ospfNbrEvents.{#SNMPINDEX}]'
              description: |
                MIB: OSPF-MIB
                The number of times this neighbor relationship has changed state or an error has occurred.
                
                Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other
                times as indicated by the value of ospfDiscontinuityTime.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.14.10.1.7.{#SNMPINDEX}'
                    - '0'
