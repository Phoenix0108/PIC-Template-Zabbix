          key: aruba.psu.discovery
          status: DISABLED
          description: 'Used for discovering PSU from ARUBAWIRED-POWERSUPPLY-MIB.'
          item_prototypes:
            - uuid: cc6a4fbd62e2467dadaf00939cb41440
              name: 'PSU [{#SNMPVALUE}]: Instantaneous power'
              type: DEPENDENT
              key: 'aruba.psu.power[arubaWiredPSUInstantaneousPower.{#SNMPINDEX}]'
              units: W
              description: |
                MIB: ARUBAWIRED-POWERSUPPLY-MIB
                Total instantaneous power supplied by the power supply in watts.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.47196.4.1.1.3.11.2.1.1.7.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: aruba.system.psu.walk
              tags:
                - tag: component
                  value: psu
                - tag: psu
                  value: '{#SNMPVALUE}'
              trigger_prototypes:
                - uuid: 75f45f43dfdc454a94187d2f4a934267
                  expression: '(last(/PIC Aruba CX 8300s by SNMP/aruba.psu.power[arubaWiredPSUInstantaneousPower.{#SNMPINDEX}])*100/{#ARUBA.POWER.SUPPLY.MAX.POWER}) > {$ARUBA.POWER.SUPPLY.THR.MAX}'
                  name: 'Aruba: PSU [{#SNMPVALUE}]: High power utilization'
                  event_name: 'Aruba: PSU [{#SNMPVALUE}]: High power utilization: {ITEM.LASTVALUE} (>{$ARUBA.POWER.SUPPLY.THR.MAX} of maximum)'
