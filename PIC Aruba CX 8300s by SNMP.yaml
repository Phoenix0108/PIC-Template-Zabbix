                4 - Create and go;
                5 - Create and wait;
                6 - Destroy.
              valuemap:
                name: 'OSPF interface status'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.14.7.1.17.{#SNMPINDEX}'
