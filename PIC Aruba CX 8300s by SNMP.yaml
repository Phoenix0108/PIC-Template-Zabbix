              description: |
                MIB: OSPF-MIB
                The OSPF Interface State.
                Possible values:
                1 - Down;
                2 - Loopback;
                3 - Waiting;
                4 - Point to point;
                5 - Designated router;
                6 - Backup designated router;
                7 - Other designated router.
              valuemap:
                name: 'OSPF interface state'
              preprocessing:
