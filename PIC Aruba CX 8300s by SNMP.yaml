  triggers:
    - uuid: 287ce22de6844980a44701bdff112a76
      expression: '(last(/PIC Aruba CX 8300s by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/PIC Aruba CX 8300s by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/PIC Aruba CX 8300s by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/PIC Aruba CX 8300s by SNMP/system.net.uptime[sysUpTime.0])<10m)'
      name: 'Aruba: Host has been restarted'
      event_name: 'Aruba: {HOST.NAME} has been restarted (uptime < 10m)'
      status: DISABLED
      priority: WARNING
      description: 'Uptime is less than 10 minutes.'
      manual_close: 'YES'
      dependencies:
        - name: 'Aruba: No SNMP data collection'
          expression: 'max(/PIC Aruba CX 8300s by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
      tags:
        - tag: scope
          value: notice
