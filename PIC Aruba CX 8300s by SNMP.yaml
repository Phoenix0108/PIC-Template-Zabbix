                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: aruba.ospf.neighbor.walk
              tags:
                - tag: component
                  value: network
                - tag: neighbor
                  value: '{#SNMPVALUE}'
            - uuid: 38f6c2439d2847c9af66790aa411a49a
              name: 'OSPF neighbor [{#SNMPVALUE}]: Retrans queue length'
