zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: a1b2c3d4e5f64789a1234567890abcd1
      name: 'PIC informatique - Template'
    - uuid: 7df96b18c230490a9a0a9b2a14bf7178
      name: 'Templates/Network devices'
  templates:
    - uuid: 22d00671fa7d4f928b55930f24b80f40
      template: 'PIC Aruba CX 8300s by SNMP'
      name: 'PIC Aruba CX 8300s by SNMP'
      description: |
        Aruba CX8300s by SNMP
        
        MIBs used:
        ARUBAWIRED-FAN-MIB
        ARUBAWIRED-POWERSUPPLY-MIB
        ARUBAWIRED-SYSTEMINFO-MIB
        ARUBAWIRED-TEMPSENSOR-MIB
        OSPF-MIB
        
        Generated by official Zabbix template tool "Templator"
      readme: |
        ## Overview
        
        The Aruba CX 8300 series is designed for core and aggregation in enterprise campus networks as well as top-of-rack/data center environments. These are high-performance fixed switches offering port speeds from 1 GbE up to 100 GbE, with maximum switching capacity up to 6.4 Tbps.
      groups:
        - name: 'PIC informatique - Template'
        - name: 'Templates/Network devices'
      items:
        - uuid: 81e4fbf242b847e0b80f83de3e009d6f
          name: 'SNMP walk OSPF area'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.14.2]'
          key: aruba.ospf.area.walk
          history: '0'
          value_type: TEXT
          description: |
            MIB: OSPF-MIB
            Used for discovering OSPF areas.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '0'
                - 'No Such Object available on this agent at this OID'
          tags:
            - tag: component
              value: raw
        - uuid: 76535cd0503847a6a4e170fabcbf6149
          name: 'SNMP walk OSPF interface'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.14.7]'
          key: aruba.ospf.interface.walk
          history: '0'
          value_type: TEXT
          description: |
            MIB: OSPF-MIB
            Used for discovering OSPF interfaces.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '0'
                - 'No Such Object available on this agent at this OID'
          tags:
            - tag: component
              value: raw
        - uuid: b65f9ab5c8cd48358c0ca4607e231bd7
          name: 'SNMP walk OSPF neighbor'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.14.10]'
          key: aruba.ospf.neighbor.walk
          history: '0'
          value_type: TEXT
          description: |
            MIB: OSPF-MIB
            Used for discovering OSPF neighbors.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '0'
                - 'No Such Object available on this agent at this OID'
          tags:
            - tag: component
              value: raw
        - uuid: 61118eab61ea4b1a95caa2931be9576a
          name: 'SNMP walk system FAN'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.47196.4.1.1.3.11.5.1]'
          key: aruba.system.fan.walk
          history: '0'
          value_type: TEXT
          description: |
            MIB: ARUBAWIRED-FAN-MIB
            Used for discovering system fans.
          tags:
            - tag: component
              value: raw
        - uuid: ccb66bfb27624c4896d1397f8c47eb80
          name: 'SNMP walk system PSU'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.47196.4.1.1.3.11.2.1]'
          key: aruba.system.psu.walk
          history: '0'
          value_type: TEXT
          description: |
            MIB: ARUBAWIRED-POWERSUPPLY-MIB
            Used for discovering the system power supply.
          tags:
            - tag: component
              value: raw
        - uuid: b5f794dbaadb4715879b2574c9edf52a
          name: 'SNMP walk system resource'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.47196.4.1.1.3.22.1.0.1]'
          key: aruba.system.resource.walk
          history: '0'
          value_type: TEXT
          description: |
            MIB: ARUBAWIRED-SYSTEMINFO-MIB
            Used for discovering system resources.
          tags:
            - tag: component
              value: raw
        - uuid: 163b2a95bd5c485abb104c123468fa3f
          name: 'SNMP walk system temperature sensor'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.4.1.47196.4.1.1.3.11.3.1]'
          key: aruba.system.sensor.walk
          history: '0'
          value_type: TEXT
          description: |
            MIB: ARUBAWIRED-TEMPSENSOR-MIB
            Used for discovering system temperature sensors.
          tags:
            - tag: component
              value: raw
        - uuid: 84b501c52eae4caeb70aa2bf6b1af655
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          description: |
            The host accessibility by ICMP ping.
            
            0 - ICMP ping fails;
            1 - ICMP ping successful.
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 8dc031c17d43414286b1809437463546
              expression: 'max(/PIC Aruba CX 8300s by SNMP/icmpping,#3)=0'
              name: 'Aruba: Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout. Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 404331e0309d4835a815c4211820c697
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          value_type: FLOAT
          units: '%'
          description: 'The percentage of lost packets.'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 58b33045156a4e1eb8ed1d32f2745a08
              expression: 'min(/PIC Aruba CX 8300s by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/PIC Aruba CX 8300s by SNMP/icmppingloss,5m)<100'
              name: 'Aruba: High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              status: DISABLED
              priority: WARNING
              description: 'ICMP packet loss detected.'
              dependencies:
                - name: 'Aruba: Unavailable by ICMP ping'
                  expression: 'max(/PIC Aruba CX 8300s by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: fc30525283bd4c289c229961b2ea7935
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          value_type: FLOAT
          units: s
          description: 'ICMP ping response time (in seconds).'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 412579c9674b4f06bd407919fbeb0c9f
              expression: 'avg(/PIC Aruba CX 8300s by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'Aruba: High ICMP ping response time'
              event_name: 'Aruba: High ICMP ping response time (>{$ICMP_RESPONSE_TIME_WARN}s for 5m)'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              status: DISABLED
              priority: WARNING
              description: 'Average ICMP response time is too high.'
              dependencies:
                - name: 'Aruba: High ICMP ping loss'
                  expression: 'min(/PIC Aruba CX 8300s by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/PIC Aruba CX 8300s by SNMP/icmppingloss,5m)<100'
                - name: 'Aruba: Unavailable by ICMP ping'
                  expression: 'max(/PIC Aruba CX 8300s by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 8d8904907fd84a85b641d795ca028bf0
          name: 'SNMP walk network interfaces'
          type: SNMP_AGENT
          snmp_oid: 'walk[1.3.6.1.2.1.2.2.1.8,1.3.6.1.2.1.2.2.1.7,1.3.6.1.2.1.31.1.1.1.18,1.3.6.1.2.1.31.1.1.1.1,1.3.6.1.2.1.2.2.1.2,1.3.6.1.2.1.2.2.1.3,1.3.6.1.2.1.2.2.1.10,1.3.6.1.2.1.2.2.1.16,1.3.6.1.2.1.2.2.1.14,1.3.6.1.2.1.2.2.1.20,1.3.6.1.2.1.2.2.1.19,1.3.6.1.2.1.2.2.1.13,1.3.6.1.2.1.2.2.1.5]'
          key: net.if.walk
          history: '0'
          value_type: TEXT
          description: 'Used for discovering interfaces from IF-MIB.'
          tags:
            - tag: component
              value: raw
        - uuid: 704d9b935c27406facc3d3cd8602bb4e
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          value_type: LOG
          description: 'The item is used to collect all SNMP traps unmatched by other snmptrap items'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: network
        - uuid: 090e5bbb85fb48cda20650b0c400e14d
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.4.0]'
          key: 'system.contact[sysContact.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The textual identification of the contact person for this managed node, together with information on how to contact this person. If no contact information is known, the value is the zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: c5c2da265dd340bba69bd6a28542f53e
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.1.0]'
          key: 'system.descr[sysDescr.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            A textual description of the entity. This value should
            include the full name and version identification of the system's hardware type, software operating-system, and
            networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 189588d04efa4e05a457f1741eb0c92f
          name: 'Uptime (hardware)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.25.1.1.0]'
          key: 'system.hw.uptime[hrSystemUptime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: HOST-RESOURCES-MIB
            The amount of time since this host was last initialized. Note that this is different from sysUpTime in the SNMPv2-MIB [RFC1907] because sysUpTime is the uptime of the network management portion of the system.
          preprocessing:
            - type: CHECK_NOT_SUPPORTED
              parameters:
                - '-1'
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 1dcdace0f77a45b0b95229ed9f064a72
          name: 'System location'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.6.0]'
          key: 'system.location[sysLocation.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            Physical location of the node (e.g., `equipment room`, `3rd floor`). If not provided, the value is a zero-length string.
          inventory_link: LOCATION
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 6505a72c314c44478c136bec9e4f99ba
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.5.0]'
          key: system.name
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            An administratively-assigned name for this managed node.By convention, this is the node's fully-qualified domain name. If the name is unknown, the value is the zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: b0a48368226e4a0c8b8c5ce283e58e03
              expression: 'last(/PIC Aruba CX 8300s by SNMP/system.name,#1)<>last(/PIC Aruba CX 8300s by SNMP/system.name,#2) and length(last(/PIC Aruba CX 8300s by SNMP/system.name))>0'
              name: 'Aruba: System name has changed'
              event_name: 'Aruba: System name has changed (new name: {ITEM.VALUE})'
              status: DISABLED
              priority: INFO
              description: 'The name of the system has changed. Acknowledge to close the problem manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
                - tag: scope
                  value: security
        - uuid: 5c2dd7becf7a4e8fbf299481b66fedce
          name: 'Uptime (network)'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.3.0]'
          key: 'system.net.uptime[sysUpTime.0]'
          delay: 30s
          trends: '0'
          units: uptime
          description: |
            MIB: SNMPv2-MIB
            Time (in hundredths of a second) since the network management portion of the system was last re-initialized.
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          tags:
            - tag: component
              value: system
        - uuid: 4ebce062e7b744be9cf4c37bd9ea6721
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 'get[1.3.6.1.2.1.1.2.0]'
          key: 'system.objectid[sysObjectID.0]'
          delay: 15m
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB
            The vendor's authoritative identification of the network management subsystem contained in the entity. This value is allocated within the SMI enterprises subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining`what kind of box' is being managed.  For example, if vendor`Flintstones, Inc.' was assigned the subtree1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its `Fred Router'.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 12h
          tags:
            - tag: component
              value: system
        - uuid: 3533ff80ec5a413596a5d6ff90e7fb72
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          description: |
            Availability of SNMP checks on the host. The value of this item corresponds to availability icons in the host list.
            Possible values:
            0 - not available
            1 - available
            2 - unknown
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 1b15dd9c0dab407abef47caae1fce8fd
              expression: 'max(/PIC Aruba CX 8300s by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'Aruba: No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              status: DISABLED
              priority: WARNING
              description: 'SNMP is not available for polling. Please check device connectivity and SNMP settings.'
              dependencies:
                - name: 'Aruba: Unavailable by ICMP ping'
                  expression: 'max(/PIC Aruba CX 8300s by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: 4c41d65342854ca3891663663faaf476
          name: 'Fan discovery'
          type: DEPENDENT
          key: aruba.fan.discovery
          status: DISABLED
          description: 'Used for discovering fans from ARUBAWIRED-FAN-MIB.'
          item_prototypes:
            - uuid: cf7c46ed61b948f19c1e214f64a19f27
              name: 'Fan [{#SNMPVALUE}]: Speed'
              type: DEPENDENT
              key: 'aruba.fan.speed[arubaWiredFanRPM.{#SNMPINDEX}]'
              value_type: FLOAT
              units: '!RPM'
              description: |
                MIB: ARUBAWIRED-FAN-MIB
                Current RPM read for the fan. RPM of -1 indicates the fan does not have RPM readback capability.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.47196.4.1.1.3.11.5.1.1.8.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: aruba.system.fan.walk
              tags:
                - tag: component
                  value: fan
                - tag: fan
                  value: '{#SNMPVALUE}'
            - uuid: 1a5f0f2f63e14991b121db08f2e4e061
              name: 'Fan [{#SNMPVALUE}]: Status'
              type: DEPENDENT
              key: 'aruba.fan.status[arubaWiredFanStateEnum.{#SNMPINDEX}]'
              description: |
                MIB: ARUBAWIRED-FAN-MIB
                Current status of the fan.
                Possible values:
                1 - Unknown;
                2 - Empty;
                3 - Uninitialized;
                4 - Ok;
                5 - Fault.
              valuemap:
                name: 'Fan status'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.4.1.47196.4.1.1.3.11.5.1.1.10.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              master_item:
                key: aruba.system.fan.walk
              tags:
                - tag: component
                  value: fan
                - tag: fan
                  value: '{#SNMPVALUE}'
              trigger_prototypes:
                - uuid: 3e5f20e52ce143f18086f0ce93b36c2e
                  expression: 'last(/PIC Aruba CX 8300s by SNMP/aruba.fan.status[arubaWiredFanStateEnum.{#SNMPINDEX}])<>4'
                  name: 'Aruba: Fan [{#SNMPVALUE}]: Status is not "Ok"'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: 'The fan status is not "Ok".'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
          master_item:
            key: aruba.system.fan.walk
          preprocessing:
            - type: SNMP_WALK_TO_JSON
              parameters:
                - '{#SNMPVALUE}'
                - 1.3.6.1.4.1.47196.4.1.1.3.11.5.1.1.4
                - '0'
              error_handler: DISCARD_VALUE
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
        - uuid: 8367314328bd427bb13f3861b55b6933
          name: 'OSPF Area discovery'
          type: DEPENDENT
          key: aruba.ospf.area.discovery
          status: DISABLED
          description: 'Used for discovering PSU from OSPF-MIB.'
          item_prototypes:
            - uuid: c1283e3c895c4087b0e8f4f13ce1cfe4
              name: 'OSPF area [{#SNMPVALUE}]: LSA checksum'
              type: DEPENDENT
              key: 'aruba.ospf.area.lsa.cksumsum[ospfAreaLsaCksumSum.{#SNMPINDEX}]'
              description: |
                MIB: OSPF-MIB
                The 32-bit sum of the checksums of the LSAs contained in this area's link state database.
                This sum excludes external (LS type-5) link state advertisements. The sum can be used to determine if there has
                been a change in a router's link state database, and to compare the link state database of two routers.
                The value should be treated as unsigned when comparing two sums of checksums.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.14.2.1.8.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: aruba.ospf.area.walk
              tags:
                - tag: area
                  value: '{#SNMPVALUE}'
                - tag: component
                  value: network
            - uuid: 5167c3045c1945f19281e9f59f124d67
              name: 'OSPF area [{#SNMPVALUE}]: Translator role'
              type: DEPENDENT
              key: 'aruba.ospf.area.lsa.translator.role[ospfAreaNssaTranslatorRole.{#SNMPINDEX}]'
              description: |
                MIB: OSPF-MIB
                Indicates an NSSA border router's ability to perform NSSA translation of type-7 LSAs into type-5 LSAs.
                Possible values:
                1 - Always;
                2 - Candidate.
              valuemap:
                name: 'OSPF translator role'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.14.2.1.11.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: aruba.ospf.area.walk
              tags:
                - tag: area
                  value: '{#SNMPVALUE}'
                - tag: component
                  value: network
            - uuid: 73a7959a1ceb412693f022c1e5e632a4
              name: 'OSPF area [{#SNMPVALUE}]: Translator state'
              type: DEPENDENT
              key: 'aruba.ospf.area.lsa.translator.state[ospfAreaNssaTranslatorState.{#SNMPINDEX}]'
              description: |
                MIB: OSPF-MIB
                Indicates NSSA border router translation state of type-7 LSAs into type-5 LSAs.
                Possible values:
                1 - Enabled;
                2 - Elected;
                3 - Disabled.
                When `Enabled`, the NSSA Border router's `OspfAreaNssaExtTranslatorRole` is `Always`.
                When `Elected`, a candidate NSSA border router is translating type-7 LSAs into type-5.
                When `Disabled`, a candidate NSSA border router is not translating type-7 LSAs into type-5.
              valuemap:
                name: 'OSPF translator state'
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.14.2.1.12.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: aruba.ospf.area.walk
              tags:
                - tag: area
                  value: '{#SNMPVALUE}'
                - tag: component
                  value: network
            - uuid: ed176050427e4530ae5ab73e4417a4f2
              name: 'OSPF area [{#SNMPVALUE}]: LSA count'
              type: DEPENDENT
              key: 'aruba.ospf.area.lsa[ospfAreaLsaCount.{#SNMPINDEX}]'
              description: |
                MIB: OSPF-MIB
                The total number of link state advertisements in this area's link state database, excluding
                AS-external LSAs.
              preprocessing:
                - type: SNMP_WALK_VALUE
                  parameters:
                    - '1.3.6.1.2.1.14.2.1.7.{#SNMPINDEX}'
                    - '0'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 12h
              master_item:
                key: aruba.ospf.area.walk
              tags:
                - tag: area
                  value: '{#SNMPVALUE}'
                - tag: component
                  value: network
            - uuid: de2edb6cc0c04c47bfb07e2d106aaf0b
              name: 'OSPF area [{#SNMPVALUE}]: Runs'
              type: DEPENDENT
