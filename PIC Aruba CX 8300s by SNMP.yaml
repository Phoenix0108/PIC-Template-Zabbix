              key: 'aruba.psu.state[arubaWiredPSUStateEnum.{#SNMPINDEX}]'
              description: |
                MIB: ARUBAWIRED-POWERSUPPLY-MIB
                Current status for the power supply.
                Possible values:
                1 - Ok;
                2 - Fault Absent;
