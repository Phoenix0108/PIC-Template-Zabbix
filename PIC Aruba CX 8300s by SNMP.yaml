              name: 'OSPF neighbor [{#SNMPVALUE}]: State'
              type: DEPENDENT
              key: 'aruba.ospf.neighbor.state[ospfNbrState.{#SNMPINDEX}]'
              description: |
                MIB: OSPF-MIB
