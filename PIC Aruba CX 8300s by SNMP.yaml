              description: |
                MIB: OSPF-MIB
                The OSPF interface's administrative status. If enabled, the interface is advertised as an internal route to an area.
                The value 'disabled' denotes that the interface is external to OSPF.
                Possible values:
                1 - Enabled;
                2 - Disabled.
