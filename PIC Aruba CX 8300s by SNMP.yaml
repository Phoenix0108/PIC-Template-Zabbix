                  value: '{#SNMPVALUE}'
            - uuid: 485d8a65b76d4e6e907036d1674a3f4f
              name: 'OSPF neighbor [{#SNMPVALUE}]: Priority'
              type: DEPENDENT
              key: 'aruba.ospf.neighbor.priority[ospfNbrPriority.{#SNMPINDEX}]'
              description: |
                MIB: OSPF-MIB
