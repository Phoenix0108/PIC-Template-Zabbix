                      value: FF465C
                    - type: INTEGER
                      name: ds.0.dataset_type
                      value: '0'
                    - type: INTEGER
                      name: ds.0.fill
                      value: '5'
                    - type: ITEM
                      name: ds.0.itemids.0
                      value:
                        host: 'PIC Aruba CX 8300s by SNMP'
                        key: icmppingsec
                    - type: INTEGER
                      name: ds.0.width
                      value: '3'
                    - type: INTEGER
                      name: legend_columns
                      value: '1'
                    - type: INTEGER
                      name: legend_statistic
                      value: '1'
                    - type: STRING
                      name: reference
                      value: AAAAA
                - type: honeycomb
                  name: 'Sensor temperature'
                  'y': '7'
                  width: '24'
                  height: '5'
                  fields:
                    - type: STRING
                      name: items.0
                      value: 'Sensor*Temperature'
                    - type: STRING
                      name: primary_label
                      value: '{{ITEM.NAME}.regsub("Sensor\s\[(.*)\]","\1")}'
                    - type: STRING
                      name: reference
                      value: AAAAD
                    - type: INTEGER
                      name: secondary_label_decimal_places
                      value: '0'
                    - type: INTEGER
                      name: secondary_label_units_show
                      value: '0'
                - type: item
                  name: 'System name'
                  x: '18'
                  width: '18'
                  hide_header: 'YES'
                  fields:
                    - type: INTEGER
                      name: desc_v_pos
                      value: '0'
                    - type: ITEM
                      name: itemid.0
                      value:
                        host: 'PIC Aruba CX 8300s by SNMP'
                        key: system.name
                    - type: INTEGER
                      name: show.0
                      value: '1'
