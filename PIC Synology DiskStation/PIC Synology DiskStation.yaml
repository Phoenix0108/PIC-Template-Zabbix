            - tag: Application
              value: 'System Health'
          triggers:
            - uuid: 2e26088e3f494343895376efa555a31c
              expression: 'avg(/PIC Synology DiskStation/synoSystem.temperature,#4)>60'
              name: 'System Temperature CRITICAL on {HOST.NAME}'
              status: DISABLED
              priority: AVERAGE
        - uuid: 1a37e5bc068b4e849cab5a2c112bfa75
          name: 'Upgrade Available'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.6574.1.5.4.0
          key: synoSystem.upgradeAvailable
