              value: Memory
            - tag: Application
              value: 'System Health'
      discovery_rules:
        - uuid: d903592472754206ae5b5058d1462f03
          name: Disk
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFINDEX},.1.3.6.1.2.1.25.2.3.1.1,{#IFDESCR},.1.3.6.1.2.1.25.2.3.1.3,{#IFUNIT},.1.3.6.1.2.1.25.2.3.1.4]'
          key: host.hrStorage.hrStorageTable.hrStorageEntry
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFDESCR}'
                value: /volume
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          item_prototypes:
            - uuid: 320b0c37c8fa4984a5e809b2bd0ad0a1
              name: 'Storage Size on {#IFDESCR}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.25.2.3.1.5.{#IFINDEX}'
              key: 'host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageSize[{#IFINDEX}]'
              delay: 3m
              units: B
              description: 'The size of the storage represented by this entry.'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#IFUNIT}'
              tags:
                - tag: Application
                  value: Disk
            - uuid: 2be048e1b7984d1cb08a1b167448e1c2
              name: 'Storage Used on {#IFDESCR} (%)'
              type: CALCULATED
              key: 'host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX},pct]'
              delay: 5m
              units: '%'
              params: 'last(//host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX}])/last(//host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageSize[{#IFINDEX}])*100'
              description: '% of disk space used.'
              tags:
                - tag: Application
                  value: Disk
              trigger_prototypes:
                - uuid: 654173766cd54efb93bff7687f650d95
                  expression: 'min(/PIC Synology DiskStation/host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX},pct],6h)>{$DISK_UTIL_HIGH} = 95'
                  name: 'Disk Space is CRITICAL on {#IFDESCR}'
                  priority: HIGH
                - uuid: 3dbc776d0eaf476bb6283740aeab35fc
                  expression: 'min(/PIC Synology DiskStation/host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX},pct],6h)>{$DISK_UTIL_WARN}'
                  name: 'Disk Space is LOW on {#IFDESCR}'
                  status: DISABLED
                  priority: WARNING
                  dependencies:
                    - name: 'Disk Space is CRITICAL on {#IFDESCR}'
                      expression: 'min(/PIC Synology DiskStation/host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX},pct],6h)>{$DISK_UTIL_HIGH} = 95'
            - uuid: 3c7220d736a64cc5bc806fb29ce4d953
              name: 'Storage Used on {#IFDESCR}'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.2.1.25.2.3.1.6.{#IFINDEX}'
              key: 'host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX}]'
              delay: 3m
              units: B
              description: 'The amount of the storage represented by this entry.'
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#IFUNIT}'
              tags:
                - tag: Application
                  value: Disk
          graph_prototypes:
            - uuid: 0c3bd95d2e35492292dd12a50a0e301e
              name: 'Disk: Storage Evolution on {#IFDESCR}'
              height: '300'
              graph_items:
                - color: '000000'
                  calc_fnc: ALL
                  item:
                    host: 'PIC Synology DiskStation'
                    key: 'host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageSize[{#IFINDEX}]'
                - sortorder: '1'
                  drawtype: FILLED_REGION
                  color: 0000EE
                  item:
                    host: 'PIC Synology DiskStation'
                    key: 'host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX}]'
            - uuid: 72e5737cbe484988a7d1b34facc30dc7
              name: 'Disk: Storage Utilization on {#IFDESCR}'
              width: '600'
              height: '340'
              yaxismax: '0'
              show_work_period: 'NO'
              show_triggers: 'NO'
              type: PIE
              show_3d: 'YES'
              graph_items:
                - color: 5B5B5B
                  calc_fnc: LAST
                  type: GRAPH_SUM
                  item:
                    host: 'PIC Synology DiskStation'
                    key: 'host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageSize[{#IFINDEX}]'
                - sortorder: '1'
                  color: AEEE00
                  calc_fnc: LAST
                  item:
                    host: 'PIC Synology DiskStation'
                    key: 'host.hrStorage.hrStorageTable.hrStorageEntry.hrStorageUsed[{#IFINDEX}]'
        - uuid: 641702439c9d4723982babb3cb161d07
          name: Network
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1]'
          key: ifMIB.ifMIBObjects.ifXTable.ifXEntry
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFNAME}'
                value: eth
          lifetime: 30d
