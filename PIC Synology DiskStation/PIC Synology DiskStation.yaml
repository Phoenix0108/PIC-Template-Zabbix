        - uuid: 949eaf0e912148939a2ff6ba36b8601a
          name: 'Synology Disk(s)'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},.1.3.6.1.4.1.6574.2.1.1.2]'
          key: synoDisk.diskTable.diskEntry
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'For all disk entry.'
          item_prototypes:
            - uuid: 600175948938431ca0ba70b1252baab3
              name: '{#SNMPVALUE} HealthStatus'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.6574.2.1.1.13.{#SNMPINDEX}'
              key: 'synoDisk.diskTable.diskEntry.diskHealthStatus.[{#SNMPINDEX}]'
              delay: 5m
              description: |
                Synology disk health status (DSM 7.1 and above): each meanings of status represented describe below:
                [1] Normal
                [2] Warning
                [3] Critical
                [4] Failing
              valuemap:
                name: 'SYNOLOGY-DISK-MIB::diskHealthStatus'
              tags:
                - tag: Application
                  value: 'Synology Disk'
              trigger_prototypes:
                - uuid: 218e673026644ba395829acb2cae6d75
                  expression: 'last(/PIC Synology DiskStation/synoDisk.diskTable.diskEntry.diskHealthStatus.[{#SNMPINDEX}])<>1'
                  name: '{#SNMPVALUE} disk health status'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'The disk is damaged'
            - uuid: 861329b33bc745128850393bf2eac9f9
              name: '{#SNMPVALUE} Model'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.6574.2.1.1.3.{#SNMPINDEX}'
              key: 'synoDisk.diskTable.diskEntry.diskModel.[{#SNMPINDEX}]'
              delay: 1d
              value_type: TEXT
              description: 'Synology disk model name: the disk model name will be showed here.'
              tags:
                - tag: Application
                  value: 'Synology Disk'
              trigger_prototypes:
                - uuid: ac0e81cdfaf94bba951e48fb1d2f8940
                  expression: '(last(/PIC Synology DiskStation/synoDisk.diskTable.diskEntry.diskModel.[{#SNMPINDEX}],#1)<>last(/PIC Synology DiskStation/synoDisk.diskTable.diskEntry.diskModel.[{#SNMPINDEX}],#2))>0'
                  name: '{#SNMPVALUE} was changed'
                  status: DISABLED
                  priority: INFO
                  description: 'Disk was changed'
            - uuid: ee0e5574ef034913a010cd4da5632ea0
              name: '{#SNMPVALUE} Status'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.6574.2.1.1.5.{#SNMPINDEX}'
              key: 'synoDisk.diskTable.diskEntry.diskStatus.[{#SNMPINDEX}]'
              delay: 5m
              description: |
                Synology disk status: each meanings of status represented describe below:
                [1] Normal: the hard disk functions normally.
                [2] Initialized: the hard disk has system partition but no data.
                [3] NotInitialized: the hard disk does not have system in system partition.	
                [4] SystemPartitionFailed: the system partitions on the hard disks are damaged.
                [5] Crashed: the hard disk has damaged.
              valuemap:
                name: 'SYNOLOGY-DISK-MIB::diskStatus'
              tags:
                - tag: Application
                  value: 'Synology Disk'
              trigger_prototypes:
                - uuid: 81559596549d41f6805b33d25b29ef31
                  expression: 'last(/PIC Synology DiskStation/synoDisk.diskTable.diskEntry.diskStatus.[{#SNMPINDEX}])=5'
                  name: '{#SNMPVALUE} disk damaged'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'The disk is damaged'
                - uuid: d87cf9c283de44f3961c69f041ef5e3b
                  expression: 'last(/PIC Synology DiskStation/synoDisk.diskTable.diskEntry.diskStatus.[{#SNMPINDEX}])<>1'
                  name: '{#SNMPVALUE} disk status'
                  opdata: 'Current status: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: 'The disk is damaged'
                - uuid: 66a62c997cf0419abfa80d5294f8bfe4
                  expression: 'last(/PIC Synology DiskStation/synoDisk.diskTable.diskEntry.diskStatus.[{#SNMPINDEX}])=4'
                  name: '{#SNMPVALUE} partition damaged'
                  priority: AVERAGE
                  description: 'Partitions on the disk are damaged'
