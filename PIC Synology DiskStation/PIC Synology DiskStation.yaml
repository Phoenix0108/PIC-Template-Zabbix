        - uuid: 4daa85b430ee4bfbb50fe5ee4853a014
          name: 'Total Free Memory'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.11.0
          key: ucdavis.memory.memTotalFree
          delay: 3m
          history: 90d
          units: B
          description: 'The total amount of memory free or available for use on this host.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: Application
              value: Memory
            - tag: Application
              value: 'System Health'
        - uuid: 467c409544bf4be9a3b9e106971ebf7f
          name: 'Total Physical Memory'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.5.0
          key: ucdavis.memory.memTotalReal
          delay: 3m
          history: 90d
