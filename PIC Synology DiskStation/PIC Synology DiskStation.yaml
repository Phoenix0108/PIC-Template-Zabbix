              value: Memory
            - tag: Application
              value: 'System Health'
        - uuid: 6d9518194ca5408aa53c3ee92a9e3316
          name: 'Total Swap Available'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.4.4.0
