          history: 90d
          units: B
          description: 'The amount of swap space currently unused or available.'
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '1024'
          tags:
            - tag: Application
              value: Memory
            - tag: Application
              value: 'System Health'
        - uuid: 10f4712a864843bfbda362fa03d42e07
          name: 'Total Buffer Memory'
          type: SNMP_AGENT
