        - uuid: 1043bdfb2a78476588483f2f9be07c1f
          name: 'CPU Idle'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.4.1.2021.11.11.0
          key: synoSystem.ssCpuIdle
