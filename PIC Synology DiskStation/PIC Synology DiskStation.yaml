          description: 'Durée d''indisponibilité SNMP continue avant de considérer la collecte SNMP en échec (utilisée par les alertes de corrélation SNMP/ICMP).'
      valuemaps:
        - uuid: 19e39ef8c4324498824fa535cb0dd924
          name: 'SYNOLOGY-DISK-MIB::diskHealthStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Warning
            - value: '3'
              newvalue: Critical
            - value: '4'
              newvalue: Failing
        - uuid: ac9e4ef4bc4d47b49fa51bd0afa81f52
          name: 'SYNOLOGY-DISK-MIB::diskStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Initialized
            - value: '3'
              newvalue: 'Not Initialized'
            - value: '4'
              newvalue: 'System Partition Failed'
            - value: '5'
              newvalue: Crashed
        - uuid: d8baf9184b214ba9a638a08e6180d14d
          name: 'SYNOLOGY-RAID-MIB::raidStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Repairing
            - value: '3'
              newvalue: Migrating
            - value: '4'
              newvalue: Expanding
            - value: '5'
              newvalue: Deleting
            - value: '6'
              newvalue: Creating
            - value: '7'
              newvalue: 'Raid Syncing'
            - value: '8'
              newvalue: 'Raid Parity Checking'
            - value: '9'
              newvalue: 'Raid Assembling'
            - value: '10'
              newvalue: Canceling
            - value: '11'
              newvalue: Degraded
            - value: '12'
              newvalue: Crashed
        - uuid: c2cf56c0bd0a41e0a07b3a6b721e4114
          name: 'SYNOLOGY-SYSTEM-MIB::powerStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Failed
        - uuid: 90a478be96f7475cb8b9c43ad247f13b
          name: 'SYNOLOGY-SYSTEM-MIB::systemStatus'
          mappings:
            - value: '1'
              newvalue: Normal
            - value: '2'
              newvalue: Failed
        - uuid: 4c4ffcd269dd4afb934e512bf46a15d3
          name: 'SYNOLOGY-SYSTEM-MIB::upgradeAvailable'
          mappings:
            - value: '1'
              newvalue: Available
            - value: '2'
              newvalue: Unavailable
            - value: '3'
              newvalue: Connecting
            - value: '4'
              newvalue: Disconnected
            - value: '5'
              newvalue: Others
