              value: raw
        - uuid: 56e5c11ef2664d29814104db94ce13b4
          name: 'Total memory'
          key: 'vm.memory.size[total]'
          units: B
          description: 'Total memory expressed in bytes.'
          tags:
            - tag: component
              value: memory
        - uuid: 9a0f41124a1d410ba7f9cd80315d6c91
          name: 'Used memory'
          key: 'vm.memory.size[used]'
          units: B
          description: 'Used memory in bytes.'
          tags:
            - tag: component
              value: memory
        - uuid: 447d1aa861054aa598ddf2531e1e0dcb
          name: 'Memory utilization'
          type: CALCULATED
          key: vm.memory.util
          value_type: FLOAT
          units: '%'
          params: 'last(//vm.memory.size[used]) / last(//vm.memory.size[total]) * 100'
          description: 'Memory utilization in %.'
          tags:
            - tag: component
              value: memory
          triggers:
            - uuid: 401819ed3229447f828c4cd7a2fabb77
              expression: 'min(/PIC Windows by Zabbix agent/vm.memory.util,5m)>{$MEMORY.UTIL.MAX}'
              name: 'Windows: High memory utilization'
              event_name: 'Windows: High memory utilization (>{$MEMORY.UTIL.MAX}% for 5m)'
              status: DISABLED
              priority: AVERAGE
              description: 'The system is running out of free memory.'
              tags:
                - tag: scope
                  value: capacity
                - tag: scope
                  value: performance
        - uuid: 64394a33776a4ca7ada0927cf69c3608
          name: 'Windows: Network interfaces WMI get'
          key: 'wmi.getall[root\cimv2,"select Name,Description,NetConnectionID,Speed,AdapterTypeId,NetConnectionStatus,GUID from win32_networkadapter where PhysicalAdapter=True and NetConnectionStatus>0"]'
          history: '0'
          value_type: TEXT
          description: 'Raw data of `win32_networkadapter.`'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: raw
        - uuid: fcda01819da14543965a2b1bf692552c
          name: 'Windows: Physical disks health WMI get'
          key: 'wmi.getall[root\microsoft\windows\storage,"SELECT DeviceId,FriendlyName,SerialNumber,MediaType,BusType,HealthStatus,Size FROM MSFT_PhysicalDisk"]'
          delay: 5m
          history: '0'
          value_type: TEXT
          description: 'Données brutes de `MSFT_PhysicalDisk` — état de santé des disques physiques (tous types : HDD/SSD/NVMe/Storage Spaces). Sert d''item maître à la découverte de santé disque.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
