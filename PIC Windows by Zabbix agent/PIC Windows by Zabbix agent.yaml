        - uuid: 2c1008269b904527aa781bd64cf752b1
          name: 'Physical disk health discovery'
          type: DEPENDENT
          key: windows.physicaldisk.health.discovery
          delay: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#FRIENDLYNAME}'
                value: '{$WINDOWS.DISK.HEALTH.MATCHES}'
              - macro: '{#FRIENDLYNAME}'
                value: '{$WINDOWS.DISK.HEALTH.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
          description: 'Découverte des disques physiques (MSFT_PhysicalDisk) pour la supervision de leur état de santé. Couvre HDD, SSD, NVMe et Storage Spaces.'
          item_prototypes:
            - uuid: ebdb316cecdc46af92b64874bc457762
              name: 'Disk [{#FRIENDLYNAME}] ({#DEVICEID}): Health status'
              type: DEPENDENT
              key: 'windows.physicaldisk.health[{#DEVICEID}]'
              description: |
                État de santé du disque physique {#FRIENDLYNAME} (n° {#DEVICEID}, S/N {#SERIALNUMBER}), issu de MSFT_PhysicalDisk.HealthStatus.
                0 = Healthy (sain), 1 = Warning (dégradé), 2 = Unhealthy (défaillant), 5 = Unknown.
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - '$[?(@.DeviceId=="{#DEVICEID}")].HealthStatus.first()'
                  error_handler: DISCARD_VALUE
              master_item:
                key: 'wmi.getall[root\microsoft\windows\storage,"SELECT DeviceId,FriendlyName,SerialNumber,MediaType,BusType,HealthStatus,Size FROM MSFT_PhysicalDisk"]'
              valuemap:
                name: 'MSFT_PhysicalDisk::HealthStatus'
              tags:
                - tag: component
                  value: storage
                - tag: disk
                  value: '{#FRIENDLYNAME}'
              trigger_prototypes:
                - uuid: 91036f59027f4468912fa4b36f2d2e02
                  expression: 'last(/PIC Windows by Zabbix agent/windows.physicaldisk.health[{#DEVICEID}])=2'
                  name: 'Windows: Disk [{#FRIENDLYNAME}] is UNHEALTHY (défaillance disque)'
                  event_name: 'Windows: Disk [{#FRIENDLYNAME}] ({#DEVICEID}) is UNHEALTHY — défaillance disque physique'
                  opdata: 'HealthStatus: {ITEM.LASTVALUE1}'
                  priority: HIGH
                  description: |
                    Le disque physique {#FRIENDLYNAME} (n° {#DEVICEID}, S/N {#SERIALNUMBER}) est signalé UNHEALTHY
                    par Windows Storage (MSFT_PhysicalDisk.HealthStatus = 2).
                    Le disque est défaillant ou sur le point de l'être — risque de perte de données imminent.

                    Actions :
                      - Sauvegarder immédiatement les données critiques si ce n'est pas déjà fait
                      - Consulter l'état SMART et le journal Système (event IDs 7, 11, 51, 153)
                      - Planifier le remplacement du disque
                      - Sur Storage Spaces / RAID : vérifier l'état du pool et sa reconstruction
                  tags:
                    - tag: scope
                      value: availability
                - uuid: ef22334225444fc69939234a72687c3a
                  expression: 'last(/PIC Windows by Zabbix agent/windows.physicaldisk.health[{#DEVICEID}])=1'
                  name: 'Windows: Disk [{#FRIENDLYNAME}] health is in WARNING state'
                  event_name: 'Windows: Disk [{#FRIENDLYNAME}] ({#DEVICEID}) health is WARNING'
                  opdata: 'HealthStatus: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    Le disque physique {#FRIENDLYNAME} (n° {#DEVICEID}, S/N {#SERIALNUMBER}) est en état WARNING
                    (MSFT_PhysicalDisk.HealthStatus = 1). Une dégradation est détectée : surveiller de près
                    et anticiper un éventuel remplacement.

                    Actions :
                      - Consulter l'état SMART détaillé et le journal Système
                      - Vérifier l'usure (SSD) ou les secteurs réalloués (HDD)
                  dependencies:
                    - name: 'Windows: Disk [{#FRIENDLYNAME}] is UNHEALTHY (défaillance disque)'
                      expression: 'last(/PIC Windows by Zabbix agent/windows.physicaldisk.health[{#DEVICEID}])=2'
                  tags:
                    - tag: scope
                      value: availability
