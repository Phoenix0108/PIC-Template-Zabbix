          key: sc.capacity.discovery
          delay: 1h
          lifetime: 30d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Découverte des disk folders et de leur usage (scDiskFolderSUTable). Espace exposé en Go par la MIB, converti en octets.'
          item_prototypes:
            - uuid: fd77c180db444d0b8f16ea686819a877
              name: 'Disk Folder #{#DFNBR} Total Space'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.16139.2.32.1.3.{#SNMPINDEX}'
              key: 'sc.capacity.total[{#SNMPINDEX}]'
              delay: 5m
              history: 90d
              units: B
