              key: 'sc.capacity.free[{#SNMPINDEX}]'
              delay: 5m
              history: 90d
              units: B
              params: 'last(//sc.capacity.total[{#SNMPINDEX}])-last(//sc.capacity.used[{#SNMPINDEX}])'
