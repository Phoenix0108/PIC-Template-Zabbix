                  parameters:
                    - '1073741824'
              tags:
                - tag: Application
                  value: Capacity
            - uuid: 1a5f1150c30745919218c376c8a80602
              name: 'Disk Folder #{#DFNBR} Used Space'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.16139.2.32.1.4.{#SNMPINDEX}'
              key: 'sc.capacity.used[{#SNMPINDEX}]'
              delay: 5m
              history: 90d
              units: B
              preprocessing:
