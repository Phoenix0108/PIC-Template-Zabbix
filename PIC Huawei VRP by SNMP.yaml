      expression: '(last(/PIC Huawei VRP by SNMP/system.hw.uptime[hrSystemUptime.0])>0 and last(/PIC Huawei VRP by SNMP/system.hw.uptime[hrSystemUptime.0])<10m) or (last(/PIC Huawei VRP by SNMP/system.hw.uptime[hrSystemUptime.0])=0 and last(/PIC Huawei VRP by SNMP/system.net.uptime[sysUpTime.0])<10m)'
      name: 'Huawei VRP: Host has been restarted'
      event_name: 'Huawei VRP: {HOST.NAME} has been restarted (uptime < 10m)'
      status: DISABLED
      priority: WARNING
      description: 'Uptime is less than 10 minutes.'
      manual_close: 'YES'
      dependencies:
